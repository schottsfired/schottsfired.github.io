<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>David Schott</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #07090f;
      --surface:      rgba(255, 255, 255, 0.03);
      --border:       rgba(255, 255, 255, 0.07);
      --border-hover: rgba(255, 255, 255, 0.15);
      --text:         rgba(255, 255, 255, 0.85);
      --muted:        rgba(255, 255, 255, 0.35);
    }

    body {
      min-height: 100dvh;
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 90% 55% at 50% -10%, rgba(94, 234, 212, 0.05) 0%, transparent 70%),
        radial-gradient(ellipse 55% 40% at 90% 110%, rgba(129, 140, 248, 0.05) 0%, transparent 70%);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 24px;
    }

    main {
      width: 100%;
      max-width: 540px;
    }

    /* ── Name ── */
    .name {
      font-size: clamp(38px, 7vw, 54px);
      font-weight: 600;
      letter-spacing: -1.5px;
      line-height: 1;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #5eead4 0%, #818cf8 52%, #f472b6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 14px;
      font-weight: 300;
      color: var(--muted);
      margin-bottom: 60px;
      letter-spacing: 0.01em;
    }

    /* ── Section ── */
    .section-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Cards ── */
    .experiments {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      transition: background 0.17s, border-color 0.17s, transform 0.17s;
    }

    .card:hover {
      background: rgba(255, 255, 255, 0.055);
      border-color: var(--border-hover);
      transform: translateX(4px);
    }

    .card-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: linear-gradient(135deg, #5eead4, #818cf8);
      box-shadow: 0 0 10px rgba(94, 234, 212, 0.45);
    }

    .card-body { flex: 1; min-width: 0; }

    .card-title {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.88);
      margin-bottom: 2px;
    }

    .card-desc {
      font-size: 12px;
      color: var(--muted);
      font-weight: 300;
    }

    .card-arrow {
      font-size: 15px;
      color: var(--muted);
      flex-shrink: 0;
      transition: color 0.17s, transform 0.17s;
    }

    .card:hover .card-arrow {
      color: rgba(255, 255, 255, 0.55);
      transform: translateX(3px);
    }
  </style>
</head>
<body>
  <main>
    <h1 class="name">David Schott</h1>
    <p class="tagline">Experiments on the web.</p>

    <section>
      <div class="section-label">Experiments</div>
      <div class="experiments">
        <a class="card" href="/experiments/particle-field/">
          <div class="card-dot"></div>
          <div class="card-body">
            <div class="card-title">Particle Field</div>
            <div class="card-desc">Interactive physics simulation</div>
          </div>
          <div class="card-arrow">→</div>
        </a>
        <a class="card" href="/experiments/moon-lander/">
          <div class="card-dot"></div>
          <div class="card-body">
            <div class="card-title">Moon Lander</div>
            <div class="card-desc">Tron-style lunar landing game</div>
          </div>
          <div class="card-arrow">→</div>
        </a>
        <a class="card" href="/experiments/nine-lives-buffet/">
          <div class="card-dot"></div>
          <div class="card-body">
            <div class="card-title">Nine Lives Buffet</div>
            <div class="card-desc">Catch fish, dodge dogs</div>
          </div>
          <div class="card-arrow">→</div>
        </a>
        <a class="card" href="/experiments/pepes-feast/">
          <div class="card-dot"></div>
          <div class="card-body">
            <div class="card-title">Pepe's Feast</div>
            <div class="card-desc">NYC rat catches food, dodges trains</div>
          </div>
          <div class="card-arrow">→</div>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
