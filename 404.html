<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#07090f">
  <title>404 · Lost in the Field</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛸</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #07090f;
      color: rgba(255, 255, 255, 0.85);
      font-family: 'Inter', system-ui, sans-serif;
      display: grid;
      place-items: center;
      -webkit-tap-highlight-color: transparent;
    }
    canvas { position: fixed; inset: 0; }
    main { position: relative; text-align: center; padding: 24px; }
    h1 {
      font-size: clamp(90px, 24vw, 180px);
      font-weight: 800;
      letter-spacing: -6px;
      line-height: 1;
      background: linear-gradient(120deg, #5eead4, #818cf8 55%, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p { margin: 14px 0 26px; color: rgba(255, 255, 255, 0.45); font-weight: 300; font-size: 15px; }
    a.btn {
      display: inline-block;
      padding: 14px 38px;
      font-size: 15px;
      font-weight: 600;
      color: #07090f;
      background: linear-gradient(135deg, #5eead4, #818cf8);
      border-radius: 99px;
      text-decoration: none;
      box-shadow: 0 8px 26px rgba(94, 234, 212, 0.3);
    }
  </style>
</head>
<body>
<canvas id="c" aria-hidden="true"></canvas>
<main>
  <h1>404</h1>
  <p>This page drifted off into the particle field.</p>
  <a class="btn" href="/">Back to the arcade</a>
</main>
<script>
(function () {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W, H, ps = [];
  function resize() {
    W = cv.width = innerWidth;
    H = cv.height = innerHeight;
  }
  resize();
  addEventListener('resize', resize);
  for (let i = 0; i < 70; i++) {
    ps.push({ x: Math.random() * innerWidth, y: Math.random() * innerHeight,
      vx: (Math.random() - .5) * .7, vy: (Math.random() - .5) * .7,
      r: Math.random() * 1.8 + .5, h: 170 + Math.random() * 140 });
  }
  if (matchMedia('(prefers-reduced-motion: reduce)').matches) {
    for (const p of ps) {
      ctx.fillStyle = `hsla(${p.h},90%,65%,.6)`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 7); ctx.fill();
    }
    return;
  }
  (function loop() {
    ctx.clearRect(0, 0, W, H);
    for (const p of ps) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x += W; if (p.x > W) p.x -= W;
      if (p.y < 0) p.y += H; if (p.y > H) p.y -= H;
      ctx.fillStyle = `hsla(${p.h},90%,65%,.7)`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 7); ctx.fill();
    }
    requestAnimationFrame(loop);
  })();
})();
</script>
</body>
</html>
