<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Moon Lander</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #010508;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      color: #00e5ff;
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      touch-action: manipulation; /* allows taps, prevents double-tap zoom */
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent 0, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px
      );
      pointer-events: none; z-index: 60;
    }

    canvas { display: block; position: fixed; top: 0; left: 0; touch-action: none; }

    /* ── HUD ─────────────────────────────────────────────────────────────── */
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 12px 16px;
      display: flex; justify-content: space-between; align-items: flex-start;
      pointer-events: none; z-index: 10;
    }
    .hud-cell { display: flex; flex-direction: column; gap: 3px; }
    .hud-cell.right { text-align: right; }
    .hud-label { font-size: 9px; letter-spacing: .15em; text-transform: uppercase; color: rgba(0,200,255,.36); }
    .hud-val {
      font-family: 'Orbitron', monospace; font-size: 16px; letter-spacing: .03em;
      color: #00e5ff; text-shadow: 0 0 10px rgba(0,220,255,.6);
    }
    .hud-val.warn   { color: #ffaa00; text-shadow: 0 0 10px rgba(255,170,0,.6); }
    .hud-val.danger { color: #ff3355; text-shadow: 0 0 10px rgba(255,50,80,.7); animation: flash .35s infinite alternate; }
    @keyframes flash { to { opacity: .35; } }

    #fuel-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    #fuel-bar {
      width: 100px; height: 6px;
      border: 1px solid rgba(0,200,255,.2); border-radius: 2px; overflow: hidden;
      background: repeating-linear-gradient(90deg, rgba(0,0,0,.4) 0 9px, transparent 9px 10px);
    }
    #fuel-fill {
      height: 100%;
      background: linear-gradient(90deg,#0080ff,#00e5ff);
      box-shadow: 0 0 7px rgba(0,200,255,.45);
      transition: width .08s;
    }
    #fuel-fill.warn { background: linear-gradient(90deg,#ff6600,#ffaa00); box-shadow: 0 0 7px rgba(255,150,0,.45); }
    #fuel-fill.crit { background: linear-gradient(90deg,#cc0000,#ff3300); box-shadow: 0 0 7px rgba(255,50,0,.45); }

    /* ── Overlay ──────────────────────────────────────────────────────────── */
    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 30;
      background: rgba(1,5,8,.9);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      transition: opacity .4s;
      /* Prevent double-tap zoom on the overlay while still allowing single taps */
      touch-action: manipulation;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }

    .ov-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(32px,8vw,60px); font-weight: 900;
      letter-spacing: .1em; text-align: center; white-space: pre-line;
      background: linear-gradient(135deg,#00e5ff 0%,#7b2fff 55%,#ff3366 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 16px rgba(0,200,255,.4));
    }
    .ov-sub { font-size: 12px; letter-spacing: .08em; color: rgba(0,200,255,.5); text-align: center; max-width: 280px; line-height: 1.7; }
    .ov-score { font-family: 'Orbitron', monospace; font-size: 24px; color: #00e5ff; text-shadow: 0 0 16px rgba(0,200,255,.65); letter-spacing: .08em; }
    .ov-tap {
      font-family: 'Orbitron', monospace; font-size: 11px; letter-spacing: .2em;
      color: rgba(0,200,255,.72); text-shadow: 0 0 9px rgba(0,200,255,.45);
      animation: blink 1.3s infinite;
      /* Reset button styles */
      background: none; border: none; cursor: pointer; padding: 8px 16px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

    /* ── Controls ─────────────────────────────────────────────────────────── */
    #controls {
      position: fixed; bottom: 0; left: 0; right: 0; height: 110px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px 18px; z-index: 10; pointer-events: none;
    }
    .btn {
      width: 74px; height: 74px;
      background: rgba(0,12,22,.82); border: 1.5px solid rgba(0,180,230,.26); border-radius: 10px;
      color: rgba(0,200,255,.48); font-size: 20px; cursor: pointer;
      -webkit-tap-highlight-color: transparent; touch-action: none;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .08s, box-shadow .08s, color .08s, background .08s;
      pointer-events: all;
      -webkit-user-select: none; user-select: none;
    }
    .btn.active { background: rgba(0,35,60,.92); border-color: rgba(0,220,255,.82); color: #00e5ff; box-shadow: 0 0 16px rgba(0,200,255,.3),inset 0 0 8px rgba(0,200,255,.06); }
    .btn.boost  { border-color: rgba(255,148,0,.88); color: #ffaa00; box-shadow: 0 0 16px rgba(255,140,0,.3),inset 0 0 8px rgba(255,140,0,.06); }
    #btn-up { width: 90px; }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="hud">
  <div class="hud-cell">
    <div class="hud-label">Altitude</div>
    <div class="hud-val" id="hud-alt">— m</div>
  </div>
  <div id="fuel-wrap">
    <div class="hud-label">Fuel</div>
    <div id="fuel-bar"><div id="fuel-fill"></div></div>
  </div>
  <div class="hud-cell right">
    <div class="hud-label">Velocity</div>
    <div class="hud-val" id="hud-vel">— m/s</div>
  </div>
</div>

<div id="overlay">
  <div class="ov-title" id="ov-title">MOON&#10;LANDER</div>
  <div class="ov-sub" id="ov-sub">Guide the lander to the pad.<br>Hold any button for boost thrust.</div>
  <div class="ov-score" id="ov-score"></div>
  <button class="ov-tap" id="ov-tap">— TAP TO LAUNCH —</button>
  <a href="/" style="font-family:'Orbitron',monospace;font-size:10px;letter-spacing:.2em;color:rgba(0,200,255,.4);text-decoration:none;padding:8px 16px">‹ HOME</a>
</div>

<div id="controls">
  <button class="btn" id="btn-left">&#9664;</button>
  <button class="btn" id="btn-up">&#9650;</button>
  <button class="btn" id="btn-right">&#9654;</button>
</div>

<script>
(function () {
  'use strict';

  // ── Prevent pinch-zoom on iOS ─────────────────────────────────────────
  document.addEventListener('gesturestart',  e => e.preventDefault(), {passive:false});
  document.addEventListener('gesturechange', e => e.preventDefault(), {passive:false});
  document.addEventListener('gestureend',    e => e.preventDefault(), {passive:false});
  document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, {passive:false});

  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');
  let W = 0, H = 0, GAME_H = 0;  // GAME_H = H minus control buttons

  const CTRL_H = 110; // control button bar height

  // ── Physics — deliberately slow for classic feel ──────────────────────
  const GRAVITY     = 0.010;
  const THRUST_UP   = 0.028;
  const THRUST_SIDE = 0.016;
  const BOOST_MUL   = 1.8;
  const BOOST_MS    = 380;
  const FUEL_MAX    = 1000;
  const FUEL_UP     = 0.38;
  const FUEL_SIDE   = 0.18;
  const SAFE_VY     = 4.0;   // lenient landing speed
  const SAFE_VX     = 2.5;
  const SAFE_ANGLE  = 0.50;  // ~29°
  const PAD_W       = 100;
  const MAX_SPEED   = 8;

  // ── State ─────────────────────────────────────────────────────────────
  const game   = { state: 'intro', score: 0 };
  const lander = { x:0, y:0, vx:0, vy:0, angle:0, fuel:FUEL_MAX, alive:true };
  const ctrl   = { left:false, up:false, right:false };
  const held   = { left:0, up:0, right:0 };
  let crashFlash = 0;
  function boosting(k) { return ctrl[k] && held[k] > 0 && (Date.now()-held[k]) > BOOST_MS; }

  // ── Terrain ───────────────────────────────────────────────────────────
  let terrain = [], padX1 = 0, padX2 = 0, padY = 0;

  function buildTerrain() {
    if (W < 10 || H < 10) return; // safety guard

    terrain = [];
    const SEGS   = Math.max(8, Math.ceil(W / 18));  // fine terrain
    const dx     = W / SEGS;
    const pSeg   = 3 + Math.floor(Math.random() * (SEGS - 7));
    const pCount = Math.max(2, Math.ceil(PAD_W / dx));

    // Terrain lives in the VISIBLE game area, safely above the controls
    // Range: 52% – 86% of GAME_H ensures it's always on screen
    const TMIN = GAME_H * 0.52;
    const TMAX = GAME_H * 0.86;
    padY  = TMIN + Math.random() * (TMAX - TMIN);
    padX1 = pSeg * dx;
    padX2 = Math.min(W - dx, padX1 + pCount * dx);

    let py = TMIN + (TMAX - TMIN) * 0.4 + (Math.random() - 0.5) * (TMAX - TMIN) * 0.2;

    for (let i = 0; i <= SEGS; i++) {
      const x = i * dx;
      let y;
      if (x >= padX1 - 1 && x <= padX2 + 1) {
        y = padY;
      } else {
        py = Math.max(TMIN * 0.85, Math.min(TMAX,
             py + (Math.random() - 0.5) * (TMAX - TMIN) * 0.28));
        y = py;
      }
      terrain.push({ x, y });
    }
    terrain[0].x = 0;
    terrain[terrain.length - 1].x = W;

    // Place lander above the pad, near the top of GAME_H
    const spawnX = padX1 + (padX2-padX1)/2 + (Math.random()-0.5) * W * 0.28;
    lander.x     = Math.max(50, Math.min(W-50, spawnX));
    lander.y     = GAME_H * 0.07;   // 7% from top — always visible
    lander.vx    = (Math.random()-0.5) * 0.5;
    lander.vy    = 0.08;             // barely moving at start
    lander.angle = (Math.random()-0.5) * 0.15;
    lander.fuel  = FUEL_MAX;
    lander.alive = true;
  }

  function groundAt(x) {
    for (let i = 0; i < terrain.length - 1; i++) {
      const a = terrain[i], b = terrain[i+1];
      if (x >= a.x && x <= b.x) {
        const t = (x-a.x)/(b.x-a.x);
        return a.y + t*(b.y-a.y);
      }
    }
    return H;
  }

  // ── Particles ─────────────────────────────────────────────────────────
  const ptcls = [];

  function Particle(x,y,vx,vy,col,life,sz) {
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;
    this.col=col;this.life=life;this.max=life;this.sz=sz;
  }
  Particle.prototype.tick = function() {
    this.x+=this.vx; this.y+=this.vy;
    this.vy+=0.030; this.vx*=0.97; this.vy*=0.98;
    this.life--;
  };
  Particle.prototype.draw = function() {
    const a=this.life/this.max;
    ctx.globalAlpha=a*a; ctx.shadowBlur=6; ctx.shadowColor=this.col; ctx.fillStyle=this.col;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.sz*a+0.4,0,6.2832); ctx.fill();
  };

  function emitThrust(x,y,angle,boost) {
    const n = boost ? 4 : 2;
    for (let i=0;i<n;i++) {
      const dir=angle+Math.PI+(Math.random()-0.5)*0.35, spd=2+Math.random()*2.5;
      const col=boost?(Math.random()>.4?'#ff9900':'#ffee00'):(Math.random()>.4?'#00ccff':'#0077ee');
      ptcls.push(new Particle(x+(Math.random()-0.5)*5,y+(Math.random()-0.5)*5,
        Math.sin(dir)*spd,-Math.cos(dir)*spd,col,14+Math.random()*10,1.5+Math.random()));
    }
  }
  function emitSide(x,y,dir) {
    for(let i=0;i<2;i++){
      const a=(dir>0?Math.PI*.5:-Math.PI*.5)+(Math.random()-0.5)*.5,s=1.2+Math.random()*1.8;
      ptcls.push(new Particle(x,y,Math.sin(a)*s,-Math.cos(a)*s,'#00aadd',9+Math.random()*6,1.1));
    }
  }
  function emitExplosion(x,y) {
    const cols=['#ff2200','#ff7700','#ffcc00','#ff0055','#ffffff','#ff4400'];
    for(let i=0;i<100;i++){
      const a=Math.random()*6.2832,s=2+Math.random()*11;
      ptcls.push(new Particle(x+(Math.random()-0.5)*24,y+(Math.random()-0.5)*24,
        Math.cos(a)*s,Math.sin(a)*s,cols[Math.floor(Math.random()*cols.length)],35+Math.random()*55,2.5+Math.random()*4.5));
    }
    setTimeout(()=>{
      for(let i=0;i<45;i++){
        const a=Math.random()*6.2832,s=0.5+Math.random()*4;
        ptcls.push(new Particle(x+(Math.random()-0.5)*44,y+(Math.random()-0.5)*22,
          Math.cos(a)*s,Math.sin(a)*s,Math.random()>.4?'#ff5500':'#cc1100',55+Math.random()*45,1.5+Math.random()*2.5));
      }
    },180);
  }
  function emitLanding(x,y) {
    for(let i=0;i<22;i++){
      const side=i<11?-1:1, spd=0.5+Math.random()*1.6;
      ptcls.push(new Particle(
        x+side*(8+Math.random()*18),y,
        side*spd*(0.8+Math.random()),-(Math.random()*0.4),
        Math.random()>.5?'#336677':'#1a4455',
        26+Math.random()*16,0.9+Math.random()*0.7));
    }
  }

  // ── Stars ─────────────────────────────────────────────────────────────
  let stars = [];
  function buildStars() {
    stars = Array.from({length:180}, () => ({
      x:Math.random(), y:Math.random(),
      r:Math.random()*1.0+0.2,
      a:Math.random()*0.5+0.15,
      tw:Math.random()*0.016+0.003,
      tp:Math.random()*6.28,
    }));
  }

  // ── Lander geometry (scaled to screen) ────────────────────────────────
  // All coords relative to lander centre. S = scale factor.
  function getScale() { return Math.min(W, GAME_H) / 520; }

  function drawLander() {
    if (!lander.alive) return;
    const s = getScale();
    ctx.save();
    ctx.translate(lander.x, lander.y);
    ctx.rotate(lander.angle);

    const C = '#00e5ff';
    ctx.shadowBlur=10; ctx.shadowColor=C; ctx.strokeStyle=C; ctx.lineWidth=1.6;

    // Body
    ctx.beginPath();
    ctx.moveTo(0,-14*s); ctx.lineTo(9*s,-5*s); ctx.lineTo(10*s,3*s);
    ctx.lineTo(7*s,9*s); ctx.lineTo(-7*s,9*s); ctx.lineTo(-10*s,3*s); ctx.lineTo(-9*s,-5*s);
    ctx.closePath(); ctx.stroke();
    ctx.globalAlpha=0.10; ctx.fillStyle=C; ctx.fill(); ctx.globalAlpha=1;

    // Cockpit
    ctx.shadowColor='#8844ff'; ctx.strokeStyle='#aa77ff'; ctx.lineWidth=1.2;
    ctx.fillStyle='rgba(100,40,255,0.18)';
    ctx.beginPath(); ctx.arc(0,-4*s,4*s,0,6.2832); ctx.fill(); ctx.stroke();

    // Legs
    ctx.shadowColor=C; ctx.strokeStyle=C; ctx.lineWidth=1.4;
    ctx.beginPath();
    ctx.moveTo(-7*s,9*s); ctx.lineTo(-15*s,19*s); ctx.lineTo(-19*s,19*s);
    ctx.moveTo( 7*s,9*s); ctx.lineTo( 15*s,19*s); ctx.lineTo( 19*s,19*s);
    // Nozzle
    ctx.moveTo(-5*s,9*s); ctx.lineTo(-3*s,15*s); ctx.lineTo(3*s,15*s); ctx.lineTo(5*s,9*s);
    ctx.stroke();
    ctx.restore();
  }

  function drawFlame() {
    if (!lander.alive || !ctrl.up || lander.fuel <= 0) return;
    const boost = boosting('up');
    const s = getScale();
    ctx.save();
    ctx.translate(lander.x, lander.y); ctx.rotate(lander.angle);

    const len=(boost?20+Math.random()*12:10+Math.random()*7)*s;
    const wid=(boost?6:4)*s;
    const g=ctx.createLinearGradient(0,15*s,0,15*s+len);
    if(boost){
      g.addColorStop(0,'rgba(255,230,0,.95)');g.addColorStop(.35,'rgba(255,110,0,.8)');g.addColorStop(1,'rgba(255,40,0,0)');
      ctx.shadowColor='#ff8800';
    } else {
      g.addColorStop(0,'rgba(0,220,255,.95)');g.addColorStop(.35,'rgba(0,100,255,.7)');g.addColorStop(1,'rgba(0,40,200,0)');
      ctx.shadowColor='#00aaff';
    }
    ctx.shadowBlur=18; ctx.fillStyle=g;
    ctx.beginPath();
    ctx.moveTo(-wid,15*s); ctx.lineTo(wid,15*s);
    ctx.lineTo((Math.random()-0.5)*3*s,15*s+len); ctx.closePath(); ctx.fill();

    if(boost){
      const age=(Date.now()-held.up-BOOST_MS)%500;
      const ring=(age/500)*45*s;
      ctx.shadowBlur=0; ctx.strokeStyle=`rgba(255,140,0,${(1-ring/(45*s))*.3})`; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.arc(0,0,ring+14*s,0,6.2832); ctx.stroke();
    }
    ctx.restore();
  }

  // ── Draw: world ───────────────────────────────────────────────────────
  let frame = 0;

  function drawBg() {
    ctx.fillStyle='#010508'; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(0,130,180,0.042)'; ctx.lineWidth=1;
    const gs=36;
    for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    ctx.shadowBlur=0;
    for(const s of stars){
      const a=s.a+Math.sin(frame*s.tw+s.tp)*.16;
      ctx.globalAlpha=Math.max(0,a); ctx.fillStyle='#ffffff';
      ctx.beginPath(); ctx.arc(s.x*W,s.y*H,s.r,0,6.2832); ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  function drawTerrain() {
    if (!terrain.length) return;
    ctx.shadowBlur=0; ctx.globalAlpha=1;

    // Ground fill
    ctx.fillStyle='#020b12';
    ctx.beginPath();
    ctx.moveTo(terrain[0].x, terrain[0].y);
    for(const p of terrain) ctx.lineTo(p.x, p.y);
    ctx.lineTo(W,H+10); ctx.lineTo(0,H+10);
    ctx.closePath(); ctx.fill();

    // Surface edge
    ctx.strokeStyle='rgba(0,130,180,0.48)'; ctx.shadowBlur=6; ctx.shadowColor='rgba(0,100,160,0.45)'; ctx.lineWidth=1.4;
    ctx.beginPath();
    ctx.moveTo(terrain[0].x,terrain[0].y);
    for(const p of terrain) ctx.lineTo(p.x,p.y);
    ctx.stroke();

    // Landing pad
    const pulse=0.65+0.35*Math.sin(frame*.065);
    ctx.shadowBlur=12*pulse; ctx.shadowColor=`rgba(0,220,255,${pulse})`;
    ctx.strokeStyle=`rgba(0,220,255,${0.68+0.32*pulse})`; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(padX1,padY); ctx.lineTo(padX2,padY); ctx.stroke();

    for(const px of [padX1,padX2]) {
      ctx.beginPath(); ctx.moveTo(px,padY); ctx.lineTo(px,padY-12); ctx.stroke();
      ctx.shadowBlur=14*pulse;
      ctx.fillStyle=`rgba(0,220,255,${0.78+0.22*pulse})`;
      ctx.beginPath(); ctx.arc(px,padY-14,3.5,0,6.2832); ctx.fill();
    }
    ctx.shadowBlur=0;
  }

  function drawVignette() {
    const vg=ctx.createRadialGradient(W/2,H/2,H*.2,W/2,H/2,H*.9);
    vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,.58)');
    ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
  }

  // ── Physics ───────────────────────────────────────────────────────────
  function updatePhysics() {
    if (!lander.alive) return;

    lander.vy += GRAVITY;

    if (ctrl.up && lander.fuel > 0) {
      const b=boosting('up'), pw=b?THRUST_UP*BOOST_MUL:THRUST_UP;
      lander.vx+=Math.sin(lander.angle)*pw; lander.vy-=Math.cos(lander.angle)*pw;
      lander.fuel-=b?FUEL_UP*2.0:FUEL_UP;
      emitThrust(lander.x,lander.y,lander.angle,b);
    }
    if (ctrl.left && lander.fuel > 0) {
      const b=boosting('left'), pw=b?THRUST_SIDE*BOOST_MUL:THRUST_SIDE;
      lander.vx-=pw; lander.angle-=0.006; lander.fuel-=b?FUEL_SIDE*1.5:FUEL_SIDE;
      emitSide(lander.x,lander.y,-1);
    }
    if (ctrl.right && lander.fuel > 0) {
      const b=boosting('right'), pw=b?THRUST_SIDE*BOOST_MUL:THRUST_SIDE;
      lander.vx+=pw; lander.angle+=0.006; lander.fuel-=b?FUEL_SIDE*1.5:FUEL_SIDE;
      emitSide(lander.x,lander.y,1);
    }

    lander.angle  *= 0.995;
    lander.angle   = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, lander.angle));
    lander.fuel    = Math.max(0, lander.fuel);

    const spd=Math.hypot(lander.vx,lander.vy);
    if (spd > MAX_SPEED) { lander.vx=lander.vx/spd*MAX_SPEED; lander.vy=lander.vy/spd*MAX_SPEED; }

    lander.x+=lander.vx; lander.y+=lander.vy;

    if (lander.x < 20)   { lander.x=20;   lander.vx= Math.abs(lander.vx)*.5; }
    if (lander.x > W-20) { lander.x=W-20; lander.vx=-Math.abs(lander.vx)*.5; }
    if (lander.y < 0)    { lander.vy=Math.max(lander.vy,.25); }
  }

  // ── Collision ─────────────────────────────────────────────────────────
  function checkCollision() {
    if (!lander.alive) return;
    const s=getScale();
    const c=Math.cos(lander.angle), sn=Math.sin(lander.angle);
    const feet=[{lx:-19*s,ly:19*s},{lx:19*s,ly:19*s},{lx:0,ly:15*s}];
    for (const f of feet) {
      const wx=lander.x+f.lx*c-f.ly*sn;
      const wy=lander.y+f.lx*sn+f.ly*c;
      if (wy >= groundAt(wx)) {
        const onPad=wx>=padX1&&wx<=padX2;
        if (onPad && lander.vy<SAFE_VY && Math.abs(lander.vx)<SAFE_VX && Math.abs(lander.angle)<SAFE_ANGLE) {
          doLand();
        } else {
          doCrash();
        }
        return;
      }
    }
  }

  // ── HUD ───────────────────────────────────────────────────────────────
  function updateHUD() {
    const gy=groundAt(lander.x);
    const s=getScale();
    const alt=Math.max(0,Math.round(gy-lander.y-19*s));
    const vel=Math.hypot(lander.vx,lander.vy);
    const pct=lander.fuel/FUEL_MAX;

    const altEl=document.getElementById('hud-alt');
    altEl.textContent=alt+' m';
    altEl.className='hud-val'+(alt<80&&vel>SAFE_VY*0.65?' warn':'');

    const velEl=document.getElementById('hud-vel');
    velEl.textContent=vel.toFixed(1)+' m/s';
    velEl.className='hud-val'+(vel>SAFE_VY*1.5&&alt<180?' danger':vel>SAFE_VY&&alt<250?' warn':'');

    const fill=document.getElementById('fuel-fill');
    fill.style.width=(pct*100)+'%';
    fill.className=pct<.15?'crit':pct<.30?'warn':'';

    for (const k of ['left','up','right']) {
      const btn=document.getElementById('btn-'+k);
      if(ctrl[k]){btn.classList.add('active');btn.classList.toggle('boost',boosting(k));}
      else{btn.classList.remove('active','boost');}
    }
  }

  // ── Game events ────────────────────────────────────────────────────────
  function showOverlay(title,titleGrad,bg,sub,scoreText,tapText,delay) {
    setTimeout(() => {
      const ov=document.getElementById('overlay');
      ov.style.background=bg;
      const t=document.getElementById('ov-title');
      t.textContent=title;
      t.style.background=titleGrad;
      t.style.webkitBackgroundClip='text'; t.style.webkitTextFillColor='transparent'; t.style.backgroundClip='text';
      document.getElementById('ov-sub').textContent=sub;
      document.getElementById('ov-score').textContent=scoreText;
      document.getElementById('ov-tap').textContent=tapText;
      ov.classList.remove('hidden');
    }, delay);
  }

  function doLand() {
    lander.vx=lander.vy=0;
    emitLanding(lander.x,lander.y+19*getScale());
    const score=Math.max(0,500+Math.round(lander.fuel/FUEL_MAX*700)-Math.round(Math.abs(lander.angle)*250));
    game.state='landed'; game.score=score;
    showOverlay('LANDED','linear-gradient(135deg,#00e5ff,#00ff88)','rgba(0,18,10,.9)',
      'Systems nominal. Mission complete.','SCORE  '+score,'— TAP TO RETRY —',500);
  }

  function doCrash() {
    lander.alive=false;
    emitExplosion(lander.x,lander.y);
    crashFlash=1.0;
    game.state='crashed';
    showOverlay('SIGNAL\nLOST','linear-gradient(135deg,#ff3355,#ff8800)','rgba(18,0,5,.9)',
      'Lander destroyed. Mission failed.','','— TAP TO RETRY —',1100);
  }

  function startGame() {
    if (game.state === 'playing') return; // guard against double-fire
    if (W < 10 || H < 10) resize();
    game.state='playing';
    crashFlash=0;
    document.getElementById('overlay').classList.add('hidden');
    for(const k of ['left','up','right']){ctrl[k]=false;held[k]=0;}
    buildTerrain();
  }

  // ── Loop ──────────────────────────────────────────────────────────────
  function loop() {
    frame++;
    if (game.state==='playing') { updatePhysics(); checkCollision(); }

    drawBg();

    ctx.save();
    for(let i=ptcls.length-1;i>=0;i--){
      ptcls[i].tick(); ptcls[i].draw();
      if(ptcls[i].life<=0) ptcls.splice(i,1);
    }
    ctx.globalAlpha=1; ctx.shadowBlur=0;
    ctx.restore();

    drawTerrain();
    drawFlame();
    drawLander();
    drawVignette();

    if(crashFlash>0){
      ctx.globalAlpha=crashFlash*0.62; ctx.fillStyle='#ff1100'; ctx.fillRect(0,0,W,H);
      ctx.globalAlpha=1; crashFlash=Math.max(0,crashFlash-0.036);
    }

    if(game.state==='playing') updateHUD();

    requestAnimationFrame(loop);
  }

  // ── Input ─────────────────────────────────────────────────────────────
  ['left','up','right'].forEach(k => {
    const btn=document.getElementById('btn-'+k);
    function on(e){e.preventDefault();if(game.state!=='playing')return;if(!ctrl[k]){ctrl[k]=true;held[k]=Date.now();}}
    function off(e){e.preventDefault();ctrl[k]=false;held[k]=0;}
    btn.addEventListener('mousedown',on);
    btn.addEventListener('touchstart',on,{passive:false});
    btn.addEventListener('mouseup',off);
    btn.addEventListener('touchend',off,{passive:false});
    btn.addEventListener('touchcancel',off);
    btn.addEventListener('mouseleave',off);
  });

  const keymap={ArrowLeft:'left',a:'left',ArrowRight:'right',d:'right',ArrowUp:'up',w:'up',' ':'up'};
  document.addEventListener('keydown',e=>{const k=keymap[e.key];if(k){e.preventDefault();if(!ctrl[k]){ctrl[k]=true;held[k]=Date.now();}}});
  document.addEventListener('keyup',e=>{const k=keymap[e.key];if(k){ctrl[k]=false;held[k]=0;}});

  // Both pointerdown and click — belt-and-suspenders across browsers/devices.
  // stopPropagation prevents the overlay listener from also firing.
  function onLaunch(e) { e.stopPropagation(); startGame(); }
  document.getElementById('ov-tap').addEventListener('pointerdown', onLaunch);
  document.getElementById('ov-tap').addEventListener('click',       onLaunch);
  document.getElementById('overlay').addEventListener('pointerdown', startGame);
  document.getElementById('overlay').addEventListener('click',       startGame);

  // ── Resize — use visualViewport for reliable mobile dimensions ─────────
  function resize() {
    // visualViewport is the most reliable on iOS/Android
    const vp = window.visualViewport;
    W = canvas.width  = Math.round(vp ? vp.width  : window.innerWidth);
    H = canvas.height = Math.round(vp ? vp.height : window.innerHeight);
    GAME_H = Math.max(200, H - CTRL_H);
    buildStars();
    if (game.state !== 'playing') buildTerrain();
  }

  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 250));
  if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);

  // ── Init ─────────────────────────────────────────────────────────────
  // Script is at end of <body> — DOM layout is already computed.
  // One rAF ensures the browser has painted at least one frame so
  // visualViewport / innerWidth are reliable. No load event needed.
  requestAnimationFrame(() => {
    resize();
    requestAnimationFrame(loop);
  });

})();
</script>
</body>
</html>
