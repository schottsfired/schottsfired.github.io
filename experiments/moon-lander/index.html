<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Moon Lander</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #010508;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      color: #00e5ff;
      -webkit-user-select: none; user-select: none;
      touch-action: none;
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.045) 3px, rgba(0,0,0,0.045) 4px
      );
      pointer-events: none;
      z-index: 60;
    }

    canvas { display: block; position: fixed; top: 0; left: 0; }

    /* ── HUD ── */
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 14px 18px;
      display: flex; justify-content: space-between; align-items: flex-start;
      pointer-events: none; z-index: 10;
    }

    .hud-cell { display: flex; flex-direction: column; gap: 4px; }
    .hud-cell.right { text-align: right; }

    .hud-label {
      font-size: 9px; letter-spacing: 0.16em;
      text-transform: uppercase; color: rgba(0,200,255,0.4);
    }

    .hud-val {
      font-family: 'Orbitron', monospace;
      font-size: 17px; letter-spacing: 0.04em;
      color: #00e5ff;
      text-shadow: 0 0 12px rgba(0,220,255,0.7);
    }

    .hud-val.warn  { color: #ffaa00; text-shadow: 0 0 12px rgba(255,170,0,0.7); }
    .hud-val.danger {
      color: #ff3355; text-shadow: 0 0 12px rgba(255,50,80,0.8);
      animation: flash 0.35s infinite alternate;
    }

    @keyframes flash { to { opacity: 0.4; } }

    /* Fuel bar */
    #fuel-wrap { display: flex; flex-direction: column; align-items: center; gap: 5px; }

    #fuel-bar {
      width: 110px; height: 7px;
      border: 1px solid rgba(0,200,255,0.25);
      border-radius: 2px; overflow: hidden;
      background: repeating-linear-gradient(
        90deg,
        rgba(0,0,0,0.4) 0px, rgba(0,0,0,0.4) 9px,
        transparent 9px, transparent 10px
      );
    }

    #fuel-fill {
      height: 100%;
      background: linear-gradient(90deg, #0080ff, #00e5ff);
      box-shadow: 0 0 8px rgba(0,200,255,0.5);
      transition: width 0.08s;
    }
    #fuel-fill.warn  { background: linear-gradient(90deg, #ff6600, #ffaa00); box-shadow: 0 0 8px rgba(255,150,0,0.5); }
    #fuel-fill.crit  { background: linear-gradient(90deg, #cc0000, #ff3300); box-shadow: 0 0 8px rgba(255,50,0,0.5); }

    /* ── Overlay ── */
    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px; z-index: 30;
      background: rgba(1, 5, 8, 0.88);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: opacity 0.4s;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }

    .ov-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(34px, 8vw, 62px);
      font-weight: 900;
      letter-spacing: 0.1em;
      text-align: center;
      white-space: pre-line;
      background: linear-gradient(135deg, #00e5ff 0%, #7b2fff 55%, #ff3366 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 18px rgba(0,200,255,0.4));
    }

    .ov-sub {
      font-size: 12px; letter-spacing: 0.09em;
      color: rgba(0,200,255,0.55); text-align: center;
      max-width: 300px; line-height: 1.75;
    }

    .ov-score {
      font-family: 'Orbitron', monospace;
      font-size: 26px; color: #00e5ff;
      text-shadow: 0 0 18px rgba(0,200,255,0.7);
      letter-spacing: 0.08em;
    }

    .ov-tap {
      font-family: 'Orbitron', monospace;
      font-size: 12px; letter-spacing: 0.22em;
      color: rgba(0,200,255,0.75);
      text-shadow: 0 0 10px rgba(0,200,255,0.5);
      animation: blink 1.3s infinite;
    }

    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.15; } }

    /* ── Controls ── */
    #controls {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 115px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 22px 22px;
      z-index: 10;
    }

    .btn {
      width: 74px; height: 74px;
      background: rgba(0, 12, 22, 0.82);
      border: 1.5px solid rgba(0, 180, 230, 0.3);
      border-radius: 10px;
      color: rgba(0, 200, 255, 0.55);
      font-size: 20px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.08s, box-shadow 0.08s, color 0.08s, background 0.08s;
      pointer-events: all;
      font-family: 'Share Tech Mono', monospace;
    }

    .btn.active {
      background: rgba(0, 35, 60, 0.92);
      border-color: rgba(0, 220, 255, 0.85);
      color: #00e5ff;
      box-shadow: 0 0 18px rgba(0,200,255,0.35), inset 0 0 10px rgba(0,200,255,0.07);
    }

    .btn.boost {
      border-color: rgba(255,150,0,0.9);
      color: #ffaa00;
      box-shadow: 0 0 18px rgba(255,140,0,0.35), inset 0 0 10px rgba(255,140,0,0.07);
    }

    #btn-up { width: 92px; height: 74px; }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="hud">
  <div class="hud-cell">
    <div class="hud-label">Altitude</div>
    <div class="hud-val" id="hud-alt">— m</div>
  </div>
  <div id="fuel-wrap">
    <div class="hud-label">Fuel</div>
    <div id="fuel-bar"><div id="fuel-fill"></div></div>
  </div>
  <div class="hud-cell right">
    <div class="hud-label">Velocity</div>
    <div class="hud-val" id="hud-vel">— m/s</div>
  </div>
</div>

<div id="overlay">
  <div class="ov-title" id="ov-title">MOON\nLANDER</div>
  <div class="ov-sub" id="ov-sub">Guide the lander to the pad.<br>Hold for boost thrust.</div>
  <div class="ov-score" id="ov-score"></div>
  <div class="ov-tap" id="ov-tap">— TAP TO LAUNCH —</div>
</div>

<div id="controls">
  <button class="btn" id="btn-left">&#9664;</button>
  <button class="btn" id="btn-up">&#9650;</button>
  <button class="btn" id="btn-right">&#9654;</button>
</div>

<script>
(function () {
  'use strict';

  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');
  let W, H;

  // ── Constants ─────────────────────────────────────────────────────────────
  const GRAVITY      = 0.020;
  const THRUST_UP    = 0.052;
  const THRUST_SIDE  = 0.026;
  const BOOST_MUL    = 1.75;
  const BOOST_MS     = 380;
  const FUEL_MAX     = 1000;
  const FUEL_UP      = 0.55;
  const FUEL_SIDE    = 0.28;
  const SAFE_VY      = 1.9;
  const SAFE_VX      = 1.3;
  const SAFE_ANGLE   = 0.28;
  const PAD_W        = 78;
  const CTRL_H       = 115;  // px reserved for controls

  // ── State ─────────────────────────────────────────────────────────────────
  const game = { state: 'intro', score: 0 };

  const lander = { x:0, y:0, vx:0, vy:0, angle:0, fuel:FUEL_MAX, alive:true };

  const ctrl = { left:false, up:false, right:false };
  const held = { left:0, up:0, right:0 };    // timestamp when held started

  function boosting(k) { return ctrl[k] && held[k] && (Date.now() - held[k]) > BOOST_MS; }

  // ── Terrain ───────────────────────────────────────────────────────────────
  let terrain = [], padX1, padX2, padY;

  function buildTerrain() {
    terrain = [];
    const gameH  = H - CTRL_H;
    const SEGS   = Math.ceil(W / 32);
    const dx     = W / SEGS;
    const pSeg   = 3 + Math.floor(Math.random() * (SEGS - 7));
    const pCount = Math.ceil(PAD_W / dx);

    padY  = gameH * 0.50 + Math.random() * gameH * 0.22;
    padX1 = pSeg * dx;
    padX2 = padX1 + pCount * dx;

    let py = gameH * 0.55 + (Math.random() - 0.5) * gameH * 0.1;

    for (let i = 0; i <= SEGS; i++) {
      const x = i * dx;
      let   y;
      if (x > padX1 - 1 && x < padX2 + 1) {
        y = padY;
      } else {
        py = Math.max(gameH * 0.32, Math.min(gameH * 0.80, py + (Math.random() - 0.5) * gameH * 0.17));
        y  = py;
      }
      terrain.push({ x, y });
    }

    lander.x     = padX1 + (padX2 - padX1) / 2 + (Math.random() - 0.5) * W * 0.35;
    lander.y     = gameH * 0.10;
    lander.vx    = (Math.random() - 0.5) * 1.4;
    lander.vy    = 0.25;
    lander.angle = (Math.random() - 0.5) * 0.25;
    lander.fuel  = FUEL_MAX;
    lander.alive = true;
  }

  // ── Particles ─────────────────────────────────────────────────────────────
  const ptcls = [];

  function Particle(x, y, vx, vy, col, life, sz) {
    this.x=x; this.y=y; this.vx=vx; this.vy=vy;
    this.col=col; this.life=life; this.max=life; this.sz=sz;
  }
  Particle.prototype.tick = function() {
    this.x+=this.vx; this.y+=this.vy;
    this.vy+=0.035; this.vx*=0.97; this.vy*=0.98;
    this.life--;
  };
  Particle.prototype.draw = function() {
    const a = this.life / this.max;
    ctx.globalAlpha = a * a;
    ctx.shadowBlur = 7; ctx.shadowColor = this.col;
    ctx.fillStyle  = this.col;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.sz * a + 0.5, 0, 6.2832);
    ctx.fill();
  };

  function emitThrust(x, y, angle, boost) {
    const n = boost ? 5 : 2;
    for (let i = 0; i < n; i++) {
      const dir = angle + Math.PI + (Math.random()-0.5)*0.35;
      const spd = 2.5 + Math.random()*3;
      const col = boost
        ? (Math.random()>0.4 ? '#ff9900' : '#ffee00')
        : (Math.random()>0.4 ? '#00ccff' : '#0088ff');
      ptcls.push(new Particle(
        x+(Math.random()-0.5)*6, y+(Math.random()-0.5)*6,
        Math.sin(dir)*spd, -Math.cos(dir)*spd,
        col, 16+Math.random()*12, 1.8+Math.random()*1.2
      ));
    }
  }

  function emitSide(x, y, dir) {
    for (let i = 0; i < 2; i++) {
      const a = (dir > 0 ? Math.PI*0.5 : -Math.PI*0.5) + (Math.random()-0.5)*0.5;
      const spd = 1.5 + Math.random()*2;
      ptcls.push(new Particle(x,y, Math.sin(a)*spd,-Math.cos(a)*spd,'#00aadd',10+Math.random()*7,1.2));
    }
  }

  function emitExplosion(x, y) {
    const cols = ['#ff2200','#ff7700','#ffcc00','#ff0055','#ffffff','#ff4400'];
    for (let i = 0; i < 70; i++) {
      const a   = Math.random()*6.2832;
      const spd = 1 + Math.random()*7;
      ptcls.push(new Particle(
        x+(Math.random()-0.5)*18, y+(Math.random()-0.5)*18,
        Math.cos(a)*spd, Math.sin(a)*spd,
        cols[Math.floor(Math.random()*cols.length)],
        28+Math.random()*35, 2+Math.random()*3
      ));
    }
  }

  function emitLanding(x, y) {
    for (let i = 0; i < 30; i++) {
      const a   = -Math.PI + Math.random()*Math.PI;
      const spd = 0.5 + Math.random()*3;
      ptcls.push(new Particle(
        x+(Math.random()-0.5)*40, y,
        Math.cos(a)*spd, Math.sin(a)*spd - 1.5,
        '#00e5ff', 20+Math.random()*20, 1.5+Math.random()
      ));
    }
  }

  // ── Stars ─────────────────────────────────────────────────────────────────
  let stars = [];
  function buildStars() {
    stars = Array.from({length:200}, () => ({
      x: Math.random(), y: Math.random(),
      r: Math.random()*1.1+0.2,
      a: Math.random()*0.55+0.15,
      tw: Math.random()*0.02+0.003,
      tp: Math.random()*6.28,
    }));
  }

  // ── Terrain height at x ────────────────────────────────────────────────
  function groundAt(x) {
    for (let i=0; i<terrain.length-1; i++) {
      const a=terrain[i], b=terrain[i+1];
      if (x>=a.x && x<=b.x) {
        const t=(x-a.x)/(b.x-a.x);
        return a.y+t*(b.y-a.y);
      }
    }
    return H;
  }

  // ── Collision ──────────────────────────────────────────────────────────
  function checkCollision() {
    if (!lander.alive) return;
    const c=Math.cos(lander.angle), s=Math.sin(lander.angle);
    const footPts = [{lx:-28,ly:28},{lx:28,ly:28},{lx:0,ly:24}];
    for (const f of footPts) {
      const wx = lander.x + f.lx*c - f.ly*s;
      const wy = lander.y + f.lx*s + f.ly*c;
      if (wy >= groundAt(wx)) {
        const onPad = wx>=padX1 && wx<=padX2;
        if (onPad && lander.vy < SAFE_VY && Math.abs(lander.vx) < SAFE_VX && Math.abs(lander.angle) < SAFE_ANGLE) {
          doLand();
        } else {
          doCrash();
        }
        return;
      }
    }
    // Boundary bounces
    if (lander.y < -80) lander.vy = Math.max(lander.vy, 0.4);
    if (lander.x < 0)   { lander.x=0;  lander.vx= Math.abs(lander.vx)*0.5; }
    if (lander.x > W)   { lander.x=W;  lander.vx=-Math.abs(lander.vx)*0.5; }
  }

  // ── Physics ────────────────────────────────────────────────────────────
  function updatePhysics() {
    if (!lander.alive) return;

    lander.vy += GRAVITY;

    if (ctrl.up && lander.fuel > 0) {
      const b    = boosting('up');
      const pwr  = b ? THRUST_UP*BOOST_MUL : THRUST_UP;
      lander.vx += Math.sin(lander.angle)*pwr;
      lander.vy -= Math.cos(lander.angle)*pwr;
      lander.fuel -= b ? FUEL_UP*2.1 : FUEL_UP;
      emitThrust(lander.x, lander.y, lander.angle, b);
    }
    if (ctrl.left && lander.fuel > 0) {
      const b   = boosting('left');
      const pwr = b ? THRUST_SIDE*BOOST_MUL : THRUST_SIDE;
      lander.vx -= pwr;
      lander.angle -= 0.007;
      lander.fuel -= b ? FUEL_SIDE*1.6 : FUEL_SIDE;
      emitSide(lander.x, lander.y, -1);
    }
    if (ctrl.right && lander.fuel > 0) {
      const b   = boosting('right');
      const pwr = b ? THRUST_SIDE*BOOST_MUL : THRUST_SIDE;
      lander.vx += pwr;
      lander.angle += 0.007;
      lander.fuel -= b ? FUEL_SIDE*1.6 : FUEL_SIDE;
      emitSide(lander.x, lander.y, 1);
    }

    // Gentle self-leveling
    lander.angle *= 0.994;
    // Clamp tilt
    lander.angle = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, lander.angle));
    // Clamp fuel
    lander.fuel  = Math.max(0, lander.fuel);
    // Speed cap
    const spd = Math.hypot(lander.vx, lander.vy);
    if (spd > 14) { lander.vx=lander.vx/spd*14; lander.vy=lander.vy/spd*14; }

    lander.x += lander.vx;
    lander.y += lander.vy;
  }

  // ── Draw: background ──────────────────────────────────────────────────
  let frame = 0;

  function drawBg() {
    ctx.fillStyle = '#010508';
    ctx.fillRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = 'rgba(0,130,180,0.045)';
    ctx.lineWidth = 1;
    const gs = 38;
    for (let x=0; x<W; x+=gs) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y=0; y<H; y+=gs) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

    // Stars (twinkling)
    ctx.shadowBlur = 0;
    for (const s of stars) {
      const a = s.a + Math.sin(frame*s.tw + s.tp)*0.18;
      ctx.globalAlpha = Math.max(0, a);
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(s.x*W, s.y*H, s.r, 0, 6.2832);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Vignette
    const vg = ctx.createRadialGradient(W/2,H/2, H*0.25, W/2,H/2, H*0.95);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.6)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
  }

  // ── Draw: terrain ──────────────────────────────────────────────────────
  function drawTerrain() {
    if (!terrain.length) return;

    // Fill body
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#020b12';
    ctx.beginPath();
    ctx.moveTo(terrain[0].x, terrain[0].y);
    for (const p of terrain) ctx.lineTo(p.x, p.y);
    ctx.lineTo(W, H); ctx.lineTo(0, H);
    ctx.closePath(); ctx.fill();

    // Edge line
    ctx.strokeStyle = 'rgba(0,130,180,0.5)';
    ctx.shadowBlur  = 7;
    ctx.shadowColor = 'rgba(0,100,160,0.5)';
    ctx.lineWidth   = 1.5;
    ctx.beginPath();
    ctx.moveTo(terrain[0].x, terrain[0].y);
    for (const p of terrain) ctx.lineTo(p.x, p.y);
    ctx.stroke();

    // Landing pad — pulsing
    const pulse = 0.7 + 0.3 * Math.sin(frame * 0.06);
    ctx.shadowBlur  = 14 * pulse;
    ctx.shadowColor = `rgba(0,220,255,${pulse})`;
    ctx.strokeStyle = `rgba(0,220,255,${0.7+0.3*pulse})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(padX1, padY); ctx.lineTo(padX2, padY);
    ctx.stroke();

    // Pad markers
    for (const px of [padX1, padX2]) {
      ctx.beginPath();
      ctx.moveTo(px, padY); ctx.lineTo(px, padY-14);
      ctx.stroke();
      ctx.shadowBlur = 16*pulse;
      ctx.fillStyle  = `rgba(0,220,255,${0.8+0.2*pulse})`;
      ctx.beginPath();
      ctx.arc(px, padY-16, 4.5, 0, 6.2832);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }

  // ── Draw: lander ──────────────────────────────────────────────────────
  function drawLander() {
    if (!lander.alive) return;
    ctx.save();
    ctx.translate(lander.x, lander.y);
    ctx.rotate(lander.angle);

    const C = '#00e5ff';
    ctx.shadowBlur = 12; ctx.shadowColor = C;
    ctx.strokeStyle = C; ctx.lineWidth = 1.8;

    // Body
    ctx.beginPath();
    ctx.moveTo(0, -22);
    ctx.lineTo(13, -8);
    ctx.lineTo(15, 4);
    ctx.lineTo(10, 13);
    ctx.lineTo(-10, 13);
    ctx.lineTo(-15, 4);
    ctx.lineTo(-13, -8);
    ctx.closePath();
    ctx.stroke();

    // Subtle body fill
    ctx.globalAlpha = 0.1;
    ctx.fillStyle = C; ctx.fill();
    ctx.globalAlpha = 1;

    // Cockpit
    ctx.shadowColor = '#8844ff';
    ctx.strokeStyle = '#aa77ff'; ctx.lineWidth = 1.5;
    ctx.fillStyle   = 'rgba(100,40,255,0.2)';
    ctx.beginPath(); ctx.arc(0, -6, 6.5, 0, 6.2832);
    ctx.fill(); ctx.stroke();

    // Reset
    ctx.shadowColor = C; ctx.strokeStyle = C; ctx.lineWidth = 1.6;

    // Legs
    ctx.beginPath();
    ctx.moveTo(-10, 13); ctx.lineTo(-22, 27); ctx.lineTo(-28, 27);
    ctx.moveTo( 10, 13); ctx.lineTo( 22, 27); ctx.lineTo( 28, 27);
    ctx.stroke();

    // Nozzle
    ctx.beginPath();
    ctx.moveTo(-7, 13); ctx.lineTo(-5, 22);
    ctx.lineTo( 5, 22); ctx.lineTo( 7, 13);
    ctx.stroke();

    ctx.restore();
  }

  // ── Draw: flame ────────────────────────────────────────────────────────
  function drawFlame() {
    if (!lander.alive || !ctrl.up || lander.fuel <= 0) return;
    const boost = boosting('up');

    ctx.save();
    ctx.translate(lander.x, lander.y);
    ctx.rotate(lander.angle);

    const len = boost ? 26+Math.random()*16 : 13+Math.random()*9;
    const wid = boost ? 8 : 5.5;
    const wobble = (Math.random()-0.5)*3;

    const grad = ctx.createLinearGradient(0, 22, 0, 22+len);
    if (boost) {
      grad.addColorStop(0,   'rgba(255,230,0,0.95)');
      grad.addColorStop(0.35,'rgba(255,110,0,0.8)');
      grad.addColorStop(1,   'rgba(255,40,0,0)');
      ctx.shadowColor = '#ff8800';
    } else {
      grad.addColorStop(0,   'rgba(0,220,255,0.95)');
      grad.addColorStop(0.35,'rgba(0,100,255,0.7)');
      grad.addColorStop(1,   'rgba(0,40,200,0)');
      ctx.shadowColor = '#00aaff';
    }
    ctx.shadowBlur = 22;
    ctx.fillStyle  = grad;
    ctx.beginPath();
    ctx.moveTo(-wid, 22);
    ctx.lineTo( wid, 22);
    ctx.lineTo(wobble+(Math.random()-0.5)*2, 22+len);
    ctx.closePath();
    ctx.fill();

    // Boost ring pulse
    if (boost) {
      const age  = (Date.now() - held.up - BOOST_MS) % 500;
      const ring = (age / 500) * 55;
      ctx.shadowBlur  = 0;
      ctx.strokeStyle = `rgba(255,140,0,${(1-ring/55)*0.35})`;
      ctx.lineWidth   = 1.5;
      ctx.beginPath();
      ctx.arc(0, 0, ring+18, 0, 6.2832);
      ctx.stroke();
    }

    ctx.restore();
  }

  // ── HUD ────────────────────────────────────────────────────────────────
  function updateHUD() {
    const gy  = groundAt(lander.x);
    const alt = Math.max(0, Math.round(gy - lander.y - 27));
    const vel = Math.hypot(lander.vx, lander.vy);
    const pct = lander.fuel / FUEL_MAX;

    const altEl = document.getElementById('hud-alt');
    altEl.textContent = alt + ' m';
    altEl.className   = 'hud-val' + (alt < 60 && vel > SAFE_VY ? ' warn' : '');

    const velEl = document.getElementById('hud-vel');
    velEl.textContent = vel.toFixed(1) + ' m/s';
    velEl.className   = 'hud-val' + (vel > SAFE_VY*1.6 && alt < 140 ? ' danger' : vel > SAFE_VY && alt < 200 ? ' warn' : '');

    const fill = document.getElementById('fuel-fill');
    fill.style.width = (pct*100) + '%';
    fill.className   = pct < 0.15 ? 'crit' : pct < 0.30 ? 'warn' : '';

    // Button visual state
    for (const k of ['left','up','right']) {
      const btn = document.getElementById('btn-'+k);
      if (ctrl[k]) {
        btn.classList.add('active');
        btn.classList.toggle('boost', boosting(k));
      } else {
        btn.classList.remove('active','boost');
      }
    }
  }

  // ── Game events ────────────────────────────────────────────────────────
  function doLand() {
    lander.alive = false;
    lander.vx = lander.vy = 0;
    emitLanding(lander.x, lander.y + 27);

    const fuelBonus  = Math.round(lander.fuel / FUEL_MAX * 800);
    const anglePen   = Math.round(Math.abs(lander.angle) * 300);
    game.score = Math.max(0, 500 + fuelBonus - anglePen);
    game.state = 'landed';

    setTimeout(() => {
      const ov = document.getElementById('overlay');
      ov.style.background = 'rgba(0,18,10,0.88)';
      document.getElementById('ov-title').textContent = 'LANDED';
      document.getElementById('ov-title').style.background = 'linear-gradient(135deg,#00e5ff,#00ff88)';
      document.getElementById('ov-title').style.webkitBackgroundClip = 'text';
      document.getElementById('ov-title').style.webkitTextFillColor  = 'transparent';
      document.getElementById('ov-title').style.backgroundClip = 'text';
      document.getElementById('ov-sub').textContent   = 'Systems nominal. Mission complete.';
      document.getElementById('ov-score').textContent = 'SCORE  ' + game.score;
      document.getElementById('ov-tap').textContent   = '— TAP TO RETRY —';
      ov.classList.remove('hidden');
    }, 600);
  }

  function doCrash() {
    lander.alive = false;
    emitExplosion(lander.x, lander.y);
    game.state = 'crashed';

    setTimeout(() => {
      const ov = document.getElementById('overlay');
      ov.style.background = 'rgba(18,0,5,0.88)';
      document.getElementById('ov-title').textContent = 'SIGNAL\nLOST';
      document.getElementById('ov-title').style.background = 'linear-gradient(135deg,#ff3355,#ff8800)';
      document.getElementById('ov-title').style.webkitBackgroundClip = 'text';
      document.getElementById('ov-title').style.webkitTextFillColor  = 'transparent';
      document.getElementById('ov-title').style.backgroundClip = 'text';
      document.getElementById('ov-sub').textContent   = 'Lander destroyed. Mission failed.';
      document.getElementById('ov-score').textContent = '';
      document.getElementById('ov-tap').textContent   = '— TAP TO RETRY —';
      ov.classList.remove('hidden');
    }, 1100);
  }

  function startGame() {
    game.state = 'playing';
    document.getElementById('overlay').classList.add('hidden');
    buildTerrain();
    for (const k of ['left','up','right']) { ctrl[k]=false; held[k]=0; }
  }

  // ── Loop ───────────────────────────────────────────────────────────────
  function loop() {
    frame++;
    drawBg();

    // Particles (behind terrain)
    ctx.save();
    for (let i = ptcls.length-1; i >= 0; i--) {
      ptcls[i].tick();
      ptcls[i].draw();
      if (ptcls[i].life <= 0) ptcls.splice(i, 1);
    }
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    ctx.restore();

    drawTerrain();
    drawFlame();
    drawLander();

    if (game.state === 'playing') {
      updatePhysics();
      checkCollision();
      updateHUD();
    }

    requestAnimationFrame(loop);
  }

  // ── Input: buttons ─────────────────────────────────────────────────────
  ['left','up','right'].forEach(k => {
    const btn = document.getElementById('btn-'+k);

    function on(e) {
      e.preventDefault();
      if (game.state !== 'playing') return;
      if (!ctrl[k]) { ctrl[k]=true; held[k]=Date.now(); }
    }
    function off(e) {
      e.preventDefault();
      ctrl[k]=false; held[k]=0;
    }

    btn.addEventListener('mousedown',   on);
    btn.addEventListener('touchstart',  on,  {passive:false});
    btn.addEventListener('mouseup',     off);
    btn.addEventListener('touchend',    off, {passive:false});
    btn.addEventListener('touchcancel', off);
    btn.addEventListener('mouseleave',  off);
  });

  // ── Input: keyboard ────────────────────────────────────────────────────
  const keymap = {
    ArrowLeft:'left', a:'left',
    ArrowRight:'right', d:'right',
    ArrowUp:'up', w:'up', ' ':'up',
  };
  document.addEventListener('keydown', e => {
    const k = keymap[e.key];
    if (k) { e.preventDefault(); if (!ctrl[k]) { ctrl[k]=true; held[k]=Date.now(); } }
  });
  document.addEventListener('keyup', e => {
    const k = keymap[e.key];
    if (k) { ctrl[k]=false; held[k]=0; }
  });

  // ── Tap overlay to start ────────────────────────────────────────────────
  const ov = document.getElementById('overlay');
  ov.addEventListener('click',    () => startGame());
  ov.addEventListener('touchend', e  => { e.preventDefault(); startGame(); }, {passive:false});

  // ── Resize ────────────────────────────────────────────────────────────
  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);

  // ── Init ──────────────────────────────────────────────────────────────
  resize();
  buildStars();
  buildTerrain();
  requestAnimationFrame(loop);

})();
</script>
</body>
</html>
