<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Moon Lander</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #010508;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      color: #00e5ff;
      -webkit-user-select: none; user-select: none;
      /* Prevent tap highlight and callout on mobile */
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px
      );
      pointer-events: none; z-index: 60;
    }

    canvas {
      display: block;
      position: fixed; top: 0; left: 0;
      /* Prevent all default touch behaviors on the canvas */
      touch-action: none;
    }

    /* ── HUD ── */
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 14px 18px;
      display: flex; justify-content: space-between; align-items: flex-start;
      pointer-events: none; z-index: 10;
    }

    .hud-cell { display: flex; flex-direction: column; gap: 4px; }
    .hud-cell.right { text-align: right; }
    .hud-label { font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(0,200,255,0.38); }

    .hud-val {
      font-family: 'Orbitron', monospace;
      font-size: 17px; letter-spacing: 0.04em;
      color: #00e5ff; text-shadow: 0 0 12px rgba(0,220,255,0.65);
    }
    .hud-val.warn   { color: #ffaa00; text-shadow: 0 0 12px rgba(255,170,0,0.65); }
    .hud-val.danger { color: #ff3355; text-shadow: 0 0 12px rgba(255,50,80,0.8); animation: flash .35s infinite alternate; }
    @keyframes flash { to { opacity: 0.38; } }

    #fuel-wrap { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    #fuel-bar {
      width: 110px; height: 7px;
      border: 1px solid rgba(0,200,255,0.22); border-radius: 2px; overflow: hidden;
      background: repeating-linear-gradient(
        90deg, rgba(0,0,0,0.4) 0px, rgba(0,0,0,0.4) 9px,
        transparent 9px, transparent 10px
      );
    }
    #fuel-fill {
      height: 100%;
      background: linear-gradient(90deg, #0080ff, #00e5ff);
      box-shadow: 0 0 8px rgba(0,200,255,0.5);
      transition: width 0.08s;
    }
    #fuel-fill.warn { background: linear-gradient(90deg,#ff6600,#ffaa00); box-shadow: 0 0 8px rgba(255,150,0,.5); }
    #fuel-fill.crit { background: linear-gradient(90deg,#cc0000,#ff3300); box-shadow: 0 0 8px rgba(255,50,0,.5); }

    /* ── Overlay ── */
    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px; z-index: 30;
      background: rgba(1,5,8,0.9);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      transition: opacity 0.4s;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }

    .ov-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(34px, 8vw, 62px);
      font-weight: 900; letter-spacing: 0.10em;
      text-align: center; white-space: pre-line;
      background: linear-gradient(135deg, #00e5ff 0%, #7b2fff 55%, #ff3366 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 18px rgba(0,200,255,0.4));
    }
    .ov-sub {
      font-size: 12px; letter-spacing: 0.09em;
      color: rgba(0,200,255,0.52); text-align: center;
      max-width: 300px; line-height: 1.75;
    }
    .ov-score {
      font-family: 'Orbitron', monospace;
      font-size: 26px; color: #00e5ff;
      text-shadow: 0 0 18px rgba(0,200,255,0.7); letter-spacing: 0.08em;
    }
    .ov-tap {
      font-family: 'Orbitron', monospace;
      font-size: 12px; letter-spacing: 0.22em;
      color: rgba(0,200,255,0.75); text-shadow: 0 0 10px rgba(0,200,255,0.5);
      animation: blink 1.3s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

    /* ── Controls ── */
    #controls {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 110px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 22px 20px;
      z-index: 10;
      /* Don't block touch on controls area */
      pointer-events: none;
    }

    .btn {
      width: 76px; height: 76px;
      background: rgba(0,12,22,0.82);
      border: 1.5px solid rgba(0,180,230,0.28);
      border-radius: 10px;
      color: rgba(0,200,255,0.5);
      font-size: 20px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .08s, box-shadow .08s, color .08s, background .08s;
      pointer-events: all;
      font-family: 'Share Tech Mono', monospace;
      /* Prevent text selection on long-press */
      -webkit-user-select: none; user-select: none;
    }
    .btn.active {
      background: rgba(0,35,60,0.92);
      border-color: rgba(0,220,255,0.85); color: #00e5ff;
      box-shadow: 0 0 18px rgba(0,200,255,0.32), inset 0 0 10px rgba(0,200,255,0.07);
    }
    .btn.boost {
      border-color: rgba(255,148,0,0.9); color: #ffaa00;
      box-shadow: 0 0 18px rgba(255,140,0,0.32), inset 0 0 10px rgba(255,140,0,0.07);
    }
    #btn-up { width: 94px; }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="hud">
  <div class="hud-cell">
    <div class="hud-label">Altitude</div>
    <div class="hud-val" id="hud-alt">— m</div>
  </div>
  <div id="fuel-wrap">
    <div class="hud-label">Fuel</div>
    <div id="fuel-bar"><div id="fuel-fill"></div></div>
  </div>
  <div class="hud-cell right">
    <div class="hud-label">Velocity</div>
    <div class="hud-val" id="hud-vel">— m/s</div>
  </div>
</div>

<div id="overlay">
  <div class="ov-title" id="ov-title">MOON&#10;LANDER</div>
  <div class="ov-sub" id="ov-sub">Guide the lander to the pad.<br>Hold for boost thrust.</div>
  <div class="ov-score" id="ov-score"></div>
  <div class="ov-tap" id="ov-tap">— TAP TO LAUNCH —</div>
</div>

<div id="controls">
  <button class="btn" id="btn-left">&#9664;</button>
  <button class="btn" id="btn-up">&#9650;</button>
  <button class="btn" id="btn-right">&#9654;</button>
</div>

<script>
(function () {
  'use strict';

  // ── Prevent pinch-zoom on iOS (ignores user-scalable=no since iOS 10) ────
  document.addEventListener('gesturestart',  e => e.preventDefault(), {passive:false});
  document.addEventListener('gesturechange', e => e.preventDefault(), {passive:false});
  document.addEventListener('gestureend',    e => e.preventDefault(), {passive:false});
  // Prevent multi-touch zoom on Android / general browsers
  document.addEventListener('touchmove', function(e) {
    if (e.touches.length > 1) e.preventDefault();
  }, {passive:false});

  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');
  let W = 1, H = 1;

  // ── Physics / game constants ───────────────────────────────────────────
  const GRAVITY     = 0.020;
  const THRUST_UP   = 0.052;
  const THRUST_SIDE = 0.026;
  const BOOST_MUL   = 1.75;
  const BOOST_MS    = 380;
  const FUEL_MAX    = 1000;
  const FUEL_UP     = 0.55;
  const FUEL_SIDE   = 0.28;
  const SAFE_VY     = 1.9;
  const SAFE_VX     = 1.3;
  const SAFE_ANGLE  = 0.28;   // ~16°
  const PAD_W       = 80;
  const CTRL_H      = 110;    // pixels reserved for control buttons

  // ── State ─────────────────────────────────────────────────────────────
  const game   = { state: 'intro', score: 0 };
  const lander = { x:0, y:0, vx:0, vy:0, angle:0, fuel:FUEL_MAX, alive:true };
  const ctrl   = { left:false, up:false, right:false };
  const held   = { left:0, up:0, right:0 };

  function boosting(k) { return ctrl[k] && held[k] > 0 && (Date.now()-held[k]) > BOOST_MS; }

  // ── Camera ────────────────────────────────────────────────────────────
  // The camera follows the lander vertically, but is also constrained so
  // the terrain is always visible in the lower part of the screen.
  let camY = 0, camYTarget = 0;

  function updateCamera() {
    const gameH = H - CTRL_H;

    // Option A: keep lander at 32% from top
    const fromLander  = lander.y - gameH * 0.32;
    // Option B: keep terrain (padY) at most at 72% of the game area from top
    const fromTerrain = padY - gameH * 0.72;

    // Take whichever shows more sky (smaller value = less scrolled down)
    camYTarget = Math.min(fromLander, fromTerrain);
    // Never scroll above the world top
    camYTarget = Math.max(0, camYTarget);

    // Smooth interpolation
    camY += (camYTarget - camY) * 0.07;
  }

  // ── Terrain ───────────────────────────────────────────────────────────
  let terrain = [], padX1, padX2, padY;

  function buildTerrain() {
    terrain = [];
    const gameH  = H - CTRL_H;
    const SEGS   = Math.max(8, Math.ceil(W / 32));
    const dx     = W / SEGS;
    const pSeg   = 3 + Math.floor(Math.random() * (SEGS - 7));
    const pCount = Math.max(2, Math.ceil(PAD_W / dx));

    // Place terrain in the lower 40-75% of game area
    padY  = gameH * 0.48 + Math.random() * gameH * 0.24;
    padX1 = pSeg * dx;
    padX2 = Math.min(W, padX1 + pCount * dx);

    let py = gameH * 0.55 + (Math.random() - 0.5) * gameH * 0.08;

    for (let i = 0; i <= SEGS; i++) {
      const x = i * dx;
      let y;
      if (x >= padX1 - 1 && x <= padX2 + 1) {
        y = padY;
      } else {
        py = Math.max(gameH * 0.30, Math.min(gameH * 0.78,
             py + (Math.random() - 0.5) * gameH * 0.16));
        y = py;
      }
      terrain.push({ x, y });
    }
    // Ensure terrain spans full width
    terrain[0].x = 0;
    terrain[terrain.length - 1].x = W;

    // Spawn lander above pad
    lander.x     = padX1 + (padX2 - padX1) / 2 + (Math.random() - 0.5) * W * 0.30;
    lander.x     = Math.max(40, Math.min(W - 40, lander.x));
    lander.y     = gameH * 0.06;   // near the top of the world
    lander.vx    = (Math.random() - 0.5) * 1.2;
    lander.vy    = 0.22;
    lander.angle = (Math.random() - 0.5) * 0.20;
    lander.fuel  = FUEL_MAX;
    lander.alive = true;

    // Reset camera to show the full picture immediately
    camY = 0;
  }

  // ── Terrain height ──────────────────────────────────────────────────
  function groundAt(x) {
    for (let i = 0; i < terrain.length - 1; i++) {
      const a = terrain[i], b = terrain[i+1];
      if (x >= a.x && x <= b.x) {
        const t = (x - a.x) / (b.x - a.x);
        return a.y + t * (b.y - a.y);
      }
    }
    return H * 2; // off the bottom
  }

  // ── Particles ────────────────────────────────────────────────────────
  const ptcls = [];

  function Particle(x, y, vx, vy, col, life, sz) {
    this.x=x; this.y=y; this.vx=vx; this.vy=vy;
    this.col=col; this.life=life; this.max=life; this.sz=sz;
  }
  Particle.prototype.tick = function() {
    this.x+=this.vx; this.y+=this.vy;
    this.vy+=0.035; this.vx*=0.97; this.vy*=0.98;
    this.life--;
  };
  Particle.prototype.draw = function() {
    const a = this.life / this.max;
    ctx.globalAlpha = a * a;
    ctx.shadowBlur = 7; ctx.shadowColor = this.col; ctx.fillStyle = this.col;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.sz * a + 0.4, 0, 6.2832);
    ctx.fill();
  };

  function emitThrust(x, y, angle, boost) {
    const n = boost ? 5 : 2;
    for (let i = 0; i < n; i++) {
      const dir = angle + Math.PI + (Math.random()-0.5)*0.35;
      const spd = 2.5 + Math.random()*3;
      const col = boost
        ? (Math.random()>0.4?'#ff9900':'#ffee00')
        : (Math.random()>0.4?'#00ccff':'#0088ff');
      ptcls.push(new Particle(
        x+(Math.random()-0.5)*6, y+(Math.random()-0.5)*6,
        Math.sin(dir)*spd, -Math.cos(dir)*spd,
        col, 16+Math.random()*12, 1.8+Math.random()*1.2
      ));
    }
  }
  function emitSide(x, y, dir) {
    for (let i = 0; i < 2; i++) {
      const a = (dir>0?Math.PI*0.5:-Math.PI*0.5)+(Math.random()-0.5)*0.5;
      const s = 1.5+Math.random()*2;
      ptcls.push(new Particle(x,y,Math.sin(a)*s,-Math.cos(a)*s,'#00aadd',10+Math.random()*7,1.2));
    }
  }
  function emitExplosion(x, y) {
    const cols=['#ff2200','#ff7700','#ffcc00','#ff0055','#ffffff','#ff4400'];
    for (let i=0; i<70; i++) {
      const a=Math.random()*6.2832, s=1+Math.random()*7;
      ptcls.push(new Particle(
        x+(Math.random()-0.5)*18, y+(Math.random()-0.5)*18,
        Math.cos(a)*s, Math.sin(a)*s,
        cols[Math.floor(Math.random()*cols.length)],
        28+Math.random()*35, 2+Math.random()*3
      ));
    }
  }
  function emitLanding(x, y) {
    for (let i=0; i<30; i++) {
      const a=-Math.PI+Math.random()*Math.PI, s=0.5+Math.random()*3;
      ptcls.push(new Particle(
        x+(Math.random()-0.5)*40, y,
        Math.cos(a)*s, Math.sin(a)*s-1.5,
        '#00e5ff', 20+Math.random()*20, 1.5+Math.random()
      ));
    }
  }

  // ── Stars ─────────────────────────────────────────────────────────────
  let stars = [];
  function buildStars() {
    stars = Array.from({length:200}, () => ({
      x: Math.random(), y: Math.random(),
      r: Math.random()*1.1+0.2,
      a: Math.random()*0.55+0.15,
      tw: Math.random()*0.018+0.003,
      tp: Math.random()*6.28,
    }));
  }

  // ── Draw helpers ─────────────────────────────────────────────────────
  let frame = 0;

  function drawBg() {
    // Background is in SCREEN space (no camera offset)
    ctx.fillStyle = '#010508';
    ctx.fillRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = 'rgba(0,130,180,0.045)';
    ctx.lineWidth = 1;
    const gs = 38;
    for (let x=0; x<W; x+=gs) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y=0; y<H; y+=gs) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

    // Stars (screen space, subtle twinkle)
    ctx.shadowBlur = 0;
    for (const s of stars) {
      const a = s.a + Math.sin(frame*s.tw+s.tp)*0.18;
      ctx.globalAlpha = Math.max(0, a);
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(s.x*W, s.y*H, s.r, 0, 6.2832);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawVignette() {
    const vg = ctx.createRadialGradient(W/2,H/2,H*0.22,W/2,H/2,H*0.92);
    vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.62)');
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
    ctx.fillStyle = vg; ctx.fillRect(0,0,W,H);
  }

  function drawTerrain() {
    if (!terrain.length) return;

    // Fill below terrain (extend deep so no gap as camera moves)
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
    ctx.fillStyle = '#020b12';
    ctx.beginPath();
    ctx.moveTo(terrain[0].x, terrain[0].y);
    for (const p of terrain) ctx.lineTo(p.x, p.y);
    ctx.lineTo(W, 9999); ctx.lineTo(0, 9999);
    ctx.closePath(); ctx.fill();

    // Edge glow
    ctx.strokeStyle = 'rgba(0,130,180,0.5)';
    ctx.shadowBlur = 7; ctx.shadowColor = 'rgba(0,100,160,0.5)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(terrain[0].x, terrain[0].y);
    for (const p of terrain) ctx.lineTo(p.x, p.y);
    ctx.stroke();

    // Landing pad
    const pulse = 0.7 + 0.3 * Math.sin(frame * 0.06);
    ctx.shadowBlur = 14 * pulse; ctx.shadowColor = `rgba(0,220,255,${pulse})`;
    ctx.strokeStyle = `rgba(0,220,255,${0.7+0.3*pulse})`; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(padX1, padY); ctx.lineTo(padX2, padY); ctx.stroke();

    // Pad beacons
    for (const px of [padX1, padX2]) {
      ctx.beginPath(); ctx.moveTo(px, padY); ctx.lineTo(px, padY-14); ctx.stroke();
      ctx.shadowBlur = 16*pulse;
      ctx.fillStyle = `rgba(0,220,255,${0.8+0.2*pulse})`;
      ctx.beginPath(); ctx.arc(px, padY-16, 4.5, 0, 6.2832); ctx.fill();
    }
    ctx.shadowBlur = 0;
  }

  function drawLander() {
    if (!lander.alive) return;
    ctx.save();
    ctx.translate(lander.x, lander.y);
    ctx.rotate(lander.angle);

    const C = '#00e5ff';
    ctx.shadowBlur = 12; ctx.shadowColor = C;
    ctx.strokeStyle = C; ctx.lineWidth = 1.8;

    // Body
    ctx.beginPath();
    ctx.moveTo(0,-22); ctx.lineTo(13,-8); ctx.lineTo(15,4);
    ctx.lineTo(10,13); ctx.lineTo(-10,13); ctx.lineTo(-15,4); ctx.lineTo(-13,-8);
    ctx.closePath(); ctx.stroke();
    ctx.globalAlpha = 0.1; ctx.fillStyle = C; ctx.fill(); ctx.globalAlpha = 1;

    // Cockpit
    ctx.shadowColor='#8844ff'; ctx.strokeStyle='#aa77ff'; ctx.lineWidth=1.5;
    ctx.fillStyle='rgba(100,40,255,0.2)';
    ctx.beginPath(); ctx.arc(0,-6,6.5,0,6.2832); ctx.fill(); ctx.stroke();

    // Legs + nozzle
    ctx.shadowColor=C; ctx.strokeStyle=C; ctx.lineWidth=1.6;
    ctx.beginPath();
    ctx.moveTo(-10,13); ctx.lineTo(-22,27); ctx.lineTo(-28,27);
    ctx.moveTo( 10,13); ctx.lineTo( 22,27); ctx.lineTo( 28,27);
    ctx.moveTo(-7,13);  ctx.lineTo(-5,22);  ctx.lineTo(5,22); ctx.lineTo(7,13);
    ctx.stroke();

    ctx.restore();
  }

  function drawFlame() {
    if (!lander.alive || !ctrl.up || lander.fuel <= 0) return;
    const boost = boosting('up');
    ctx.save();
    ctx.translate(lander.x, lander.y); ctx.rotate(lander.angle);

    const len = boost ? 26+Math.random()*16 : 13+Math.random()*9;
    const wid = boost ? 8 : 5.5;
    const g   = ctx.createLinearGradient(0,22,0,22+len);
    if (boost) {
      g.addColorStop(0,'rgba(255,230,0,0.95)'); g.addColorStop(0.35,'rgba(255,110,0,0.8)'); g.addColorStop(1,'rgba(255,40,0,0)');
      ctx.shadowColor='#ff8800';
    } else {
      g.addColorStop(0,'rgba(0,220,255,0.95)'); g.addColorStop(0.35,'rgba(0,100,255,0.7)'); g.addColorStop(1,'rgba(0,40,200,0)');
      ctx.shadowColor='#00aaff';
    }
    ctx.shadowBlur=22; ctx.fillStyle=g;
    ctx.beginPath();
    ctx.moveTo(-wid,22); ctx.lineTo(wid,22);
    ctx.lineTo((Math.random()-0.5)*3, 22+len); ctx.closePath(); ctx.fill();

    if (boost) {
      const age  = (Date.now()-held.up-BOOST_MS) % 500;
      const ring = (age/500)*55;
      ctx.shadowBlur=0; ctx.strokeStyle=`rgba(255,140,0,${(1-ring/55)*0.32})`; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(0,0,ring+18,0,6.2832); ctx.stroke();
    }
    ctx.restore();
  }

  // ── Physics ──────────────────────────────────────────────────────────
  function updatePhysics() {
    if (!lander.alive) return;

    lander.vy += GRAVITY;

    if (ctrl.up && lander.fuel > 0) {
      const b = boosting('up'), pw = b ? THRUST_UP*BOOST_MUL : THRUST_UP;
      lander.vx += Math.sin(lander.angle)*pw; lander.vy -= Math.cos(lander.angle)*pw;
      lander.fuel -= b ? FUEL_UP*2.1 : FUEL_UP;
      emitThrust(lander.x, lander.y, lander.angle, b);
    }
    if (ctrl.left && lander.fuel > 0) {
      const b = boosting('left'), pw = b ? THRUST_SIDE*BOOST_MUL : THRUST_SIDE;
      lander.vx -= pw; lander.angle -= 0.007; lander.fuel -= b ? FUEL_SIDE*1.6 : FUEL_SIDE;
      emitSide(lander.x, lander.y, -1);
    }
    if (ctrl.right && lander.fuel > 0) {
      const b = boosting('right'), pw = b ? THRUST_SIDE*BOOST_MUL : THRUST_SIDE;
      lander.vx += pw; lander.angle += 0.007; lander.fuel -= b ? FUEL_SIDE*1.6 : FUEL_SIDE;
      emitSide(lander.x, lander.y, 1);
    }

    lander.angle  *= 0.994;
    lander.angle   = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, lander.angle));
    lander.fuel    = Math.max(0, lander.fuel);
    const spd = Math.hypot(lander.vx, lander.vy);
    if (spd > 14) { lander.vx=lander.vx/spd*14; lander.vy=lander.vy/spd*14; }

    lander.x += lander.vx; lander.y += lander.vy;

    // Side walls
    if (lander.x <  20) { lander.x =  20; lander.vx =  Math.abs(lander.vx)*0.5; }
    if (lander.x > W-20){ lander.x = W-20; lander.vx = -Math.abs(lander.vx)*0.5; }
    // Ceiling
    if (lander.y < 0) { lander.vy = Math.max(lander.vy, 0.3); }
  }

  // ── Collision ────────────────────────────────────────────────────────
  function checkCollision() {
    if (!lander.alive) return;
    const c = Math.cos(lander.angle), s = Math.sin(lander.angle);
    const feet = [{lx:-28,ly:27},{lx:28,ly:27},{lx:0,ly:23}];
    for (const f of feet) {
      const wx = lander.x + f.lx*c - f.ly*s;
      const wy = lander.y + f.lx*s + f.ly*c;
      if (wy >= groundAt(wx)) {
        const onPad = wx>=padX1 && wx<=padX2;
        if (onPad && lander.vy < SAFE_VY && Math.abs(lander.vx) < SAFE_VX && Math.abs(lander.angle) < SAFE_ANGLE) {
          doLand();
        } else {
          doCrash();
        }
        return;
      }
    }
  }

  // ── HUD ──────────────────────────────────────────────────────────────
  function updateHUD() {
    const gy  = groundAt(lander.x);
    const alt = Math.max(0, Math.round(gy - lander.y - 27));
    const vel = Math.hypot(lander.vx, lander.vy);
    const pct = lander.fuel / FUEL_MAX;

    const altEl = document.getElementById('hud-alt');
    altEl.textContent = alt + ' m';
    altEl.className   = 'hud-val' + (alt < 60 && vel > SAFE_VY ? ' warn' : '');

    const velEl = document.getElementById('hud-vel');
    velEl.textContent = vel.toFixed(1) + ' m/s';
    velEl.className   = 'hud-val' + (vel > SAFE_VY*1.6 && alt < 150 ? ' danger' : vel > SAFE_VY && alt < 220 ? ' warn' : '');

    const fill = document.getElementById('fuel-fill');
    fill.style.width = (pct*100)+'%';
    fill.className   = pct < 0.15 ? 'crit' : pct < 0.30 ? 'warn' : '';

    for (const k of ['left','up','right']) {
      const btn = document.getElementById('btn-'+k);
      if (ctrl[k]) { btn.classList.add('active'); btn.classList.toggle('boost', boosting(k)); }
      else          { btn.classList.remove('active','boost'); }
    }
  }

  // ── Game events ──────────────────────────────────────────────────────
  function showOverlay(title, titleGrad, bg, sub, scoreText, tapText, delay) {
    setTimeout(() => {
      const ov = document.getElementById('overlay');
      ov.style.background = bg;
      const t = document.getElementById('ov-title');
      t.textContent = title;
      t.style.cssText = `background:${titleGrad};-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-family:'Orbitron',monospace;font-size:clamp(34px,8vw,62px);font-weight:900;letter-spacing:.1em;text-align:center;white-space:pre-line;filter:drop-shadow(0 0 18px rgba(0,200,255,.4))`;
      document.getElementById('ov-sub').textContent   = sub;
      document.getElementById('ov-score').textContent = scoreText;
      document.getElementById('ov-tap').textContent   = tapText;
      ov.classList.remove('hidden');
    }, delay);
  }

  function doLand() {
    lander.alive = false; lander.vx = lander.vy = 0;
    emitLanding(lander.x, lander.y+27);
    const score = Math.max(0, 500 + Math.round(lander.fuel/FUEL_MAX*800) - Math.round(Math.abs(lander.angle)*300));
    game.state = 'landed'; game.score = score;
    showOverlay('LANDED','linear-gradient(135deg,#00e5ff,#00ff88)',
      'rgba(0,18,10,0.90)',
      'Systems nominal. Mission complete.',
      'SCORE  '+score, '— TAP TO RETRY —', 500);
  }

  function doCrash() {
    lander.alive = false;
    emitExplosion(lander.x, lander.y);
    game.state = 'crashed';
    showOverlay('SIGNAL\nLOST','linear-gradient(135deg,#ff3355,#ff8800)',
      'rgba(18,0,5,0.90)',
      'Lander destroyed. Mission failed.',
      '', '— TAP TO RETRY —', 1100);
  }

  function startGame() {
    game.state = 'playing';
    document.getElementById('overlay').classList.add('hidden');
    for (const k of ['left','up','right']) { ctrl[k]=false; held[k]=0; }
    buildTerrain();
  }

  // ── Main loop ────────────────────────────────────────────────────────
  function loop() {
    frame++;

    if (game.state === 'playing') {
      updatePhysics();
      checkCollision();
      updateCamera();
    }

    // Background (screen space)
    drawBg();

    // Apply camera transform for world-space drawing
    ctx.save();
    ctx.translate(0, -camY);

    // Particles
    ctx.save();
    for (let i = ptcls.length-1; i >= 0; i--) {
      ptcls[i].tick(); ptcls[i].draw();
      if (ptcls[i].life <= 0) ptcls.splice(i, 1);
    }
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    ctx.restore();

    drawTerrain();
    drawFlame();
    drawLander();

    ctx.restore(); // end camera transform

    drawVignette(); // screen space overlay

    if (game.state === 'playing') updateHUD();

    requestAnimationFrame(loop);
  }

  // ── Button input ─────────────────────────────────────────────────────
  ['left','up','right'].forEach(k => {
    const btn = document.getElementById('btn-'+k);

    function on(e) {
      e.preventDefault();
      if (game.state !== 'playing') return;
      if (!ctrl[k]) { ctrl[k]=true; held[k]=Date.now(); }
    }
    function off(e) { e.preventDefault(); ctrl[k]=false; held[k]=0; }

    btn.addEventListener('mousedown',   on);
    btn.addEventListener('touchstart',  on,  {passive:false});
    btn.addEventListener('mouseup',     off);
    btn.addEventListener('touchend',    off, {passive:false});
    btn.addEventListener('touchcancel', off);
    btn.addEventListener('mouseleave',  off);
  });

  // ── Keyboard ─────────────────────────────────────────────────────────
  const keymap = { ArrowLeft:'left',a:'left', ArrowRight:'right',d:'right', ArrowUp:'up',w:'up',' ':'up' };
  document.addEventListener('keydown', e => {
    const k=keymap[e.key]; if(k){e.preventDefault(); if(!ctrl[k]){ctrl[k]=true;held[k]=Date.now();}}
  });
  document.addEventListener('keyup', e => {
    const k=keymap[e.key]; if(k){ctrl[k]=false;held[k]=0;}
  });

  // ── Overlay tap ──────────────────────────────────────────────────────
  const ov = document.getElementById('overlay');
  ov.addEventListener('click',    ()  => startGame());
  ov.addEventListener('touchend', e   => { e.preventDefault(); startGame(); }, {passive:false});

  // ── Resize ────────────────────────────────────────────────────────────
  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    // Rebuild stars and terrain any time we're not mid-game
    buildStars();
    if (game.state !== 'playing') buildTerrain();
  }

  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 200));

  // ── Init — defer until layout is fully computed ───────────────────────
  window.addEventListener('load', () => {
    resize();            // now W/H are guaranteed correct
    requestAnimationFrame(loop);
  });

})();
</script>
</body>
</html>
