<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Pepe's Feast</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0A0A14;
      touch-action: manipulation;
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    canvas { display: block; position: fixed; top: 0; left: 0; touch-action: none; }
    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 20;
      background: rgba(8,6,18,.9);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      transition: opacity .35s;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    .ov-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(16px, 4.5vw, 26px);
      text-align: center; line-height: 1.6;
      background: linear-gradient(135deg, #FFD700 0%, #FF8800 60%, #FF4400 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 10px rgba(255,180,0,.5));
    }
    .ov-sub {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(6px, 1.8vw, 9px);
      color: rgba(255,220,150,.6);
      text-align: center; line-height: 2.4;
    }
    .ov-score {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(11px, 3vw, 16px);
      color: #FFD700;
      text-shadow: 0 0 10px rgba(255,215,0,.6);
    }
    .ov-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(9px, 2.5vw, 12px);
      color: #FFD700;
      background: none; border: 2px solid rgba(255,215,0,.5);
      border-radius: 4px; padding: 12px 26px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse {
      0%,100% { border-color: rgba(255,215,0,.5); box-shadow: 0 0 8px rgba(255,215,0,.2); }
      50%      { border-color: rgba(255,215,0,.9); box-shadow: 0 0 18px rgba(255,215,0,.5); }
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="overlay">
  <div class="ov-title" id="ov-title">PEPE'S<br>FEAST</div>
  <div class="ov-sub" id="ov-sub">Slide to move • Swipe up or double-tap to jump<br>Catch food • Dodge trains &amp; cats • Stay fed!</div>
  <div class="ov-score" id="ov-score"></div>
  <button class="ov-btn" id="ov-btn">▶ PLAY</button>
</div>
<script>
(function () {
  'use strict';

  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const r = Math.round;

  let W = 0, H = 0, GROUND_Y = 0;
  const PX = 3;

  // ── State ──────────────────────────────────────────────────────────────
  const game = { state: 'intro', score: 0, lives: 6, hiScore: 0, frame: 0 };

  const rat = {
    x: 0, y: 0, vy: 0,
    onGround: true,
    frame: 0, frameTimer: 0,
    invincible: 0,
  };

  let food        = [];
  let enemies     = [];
  let particles   = [];
  let floatTexts  = [];
  let stars       = [];
  let buildings   = [];
  let steamPuffs  = [];

  let foodTimer   = 0;
  let enemyTimer  = 0;
  let difficulty  = 1;
  let enemyWarning = null;
  let screenShake = 0;
  let lastTapTime = 0;

  // ── Touch ──────────────────────────────────────────────────────────────
  let touchX = null, touchStartY = 0, touchStartTime = 0, touching = false;
  const keys = {};

  // ── Helpers ────────────────────────────────────────────────────────────
  const rand  = (a, b) => a + Math.random() * (b - a);
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

  function block(x, y, w, h, col) {
    ctx.fillStyle = col;
    ctx.fillRect(r(x), r(y), r(w * PX), r(h * PX));
  }

  // ── Pepe (cute NYC rat) ────────────────────────────────────────────────
  // cx,cy = foot position
  function drawPepe(cx, cy, f, inv) {
    if (inv > 0 && Math.floor(inv / 5) % 2 === 1) return;

    const la = f % 2;
    const B = (x, y, w, h, col) => block(cx + x * PX, cy + y * PX, w, h, col);

    // Tail (long, curling)
    B(6, -10, 2, 6, '#D4A0A8');
    B(7, -14, 2, 4, '#D4A0A8');
    B(8, -17, 2, 3, '#C49090');

    // Body (chubby)
    B(-6, -12, 12, 8, '#B8A890');
    B(-5, -9,  8, 2, '#D0C0A8');  // belly lighter

    // Jacket (NYC style — gray hoodie)
    B(-5, -12, 10, 5, '#7A8A9A');
    B(-4, -12, 8,  1, '#6A7A8A');  // collar
    B(-1, -11, 2,  4, '#555F6A');  // zipper

    // Head (big round, chibi)
    B(-7, -25, 14, 14, '#C0AA90');
    B(-6, -24, 12, 12, '#D8C8A8');  // face lighter

    // Ears (big round rat ears)
    B(-9, -28, 6, 6, '#C0AA90');    // left outer
    B(3,  -28, 6, 6, '#C0AA90');    // right outer
    B(-8, -27, 4, 4, '#FFAABB');    // left inner pink
    B(4,  -27, 4, 4, '#FFAABB');    // right inner pink

    // Eyes — big kawaii dark
    // Left eye
    B(-5, -23, 5, 6, '#1A1A28');
    B(-4, -22, 3, 4, '#2244AA');
    B(-3, -21, 1, 3, '#080818');    // pupil
    B(-4, -22, 2, 2, '#FFFFFF');    // shine
    B(-3, -17, 2, 1, '#99BBEE');    // glint
    B(-6, -24, 6, 1, '#1A1A28');    // top lash
    B(-6, -17, 5, 1, '#22223A');    // bottom lash

    // Right eye
    B(0, -23, 5, 6, '#1A1A28');
    B(1, -22, 3, 4, '#2244AA');
    B(2, -21, 1, 3, '#080818');
    B(0, -22, 2, 2, '#FFFFFF');
    B(2, -17, 2, 1, '#99BBEE');
    B(-1, -24, 7, 1, '#1A1A28');
    B(1,  -17, 5, 1, '#22223A');

    // Blush
    ctx.globalAlpha = 0.55;
    B(-7, -19, 4, 2, '#FF9999');
    B(3,  -19, 4, 2, '#FF9999');
    ctx.globalAlpha = 1;

    // Nose (small pink button)
    B(-1, -17, 2, 2, '#FF8888');

    // Mouth (tiny smile)
    B(-2, -15, 1, 1, '#886655');
    B(-1, -14, 3, 1, '#886655');
    B(2,  -15, 1, 1, '#886655');

    // Whiskers
    B(-11, -19, 4, 1, '#E8D8C0');
    B(-11, -17, 4, 1, '#E8D8C0');
    B(7,   -19, 4, 1, '#E8D8C0');
    B(7,   -17, 4, 1, '#E8D8C0');

    // Tiny NYC cap (Yankees style)
    B(-5, -26, 10, 2, '#1A1A1A');   // brim
    B(-4, -28, 8,  2, '#1A1A1A');   // cap body low
    B(-3, -30, 6,  2, '#1A1A1A');   // cap body high
    B(-1, -30, 2,  1, '#FFFFFF');   // logo NY
    B(-6, -27, 1,  1, '#1A1A1A');   // brim extension left

    // Legs (short)
    B(-5, -4 + la, 3, 4, '#9A8A78');
    B(2,  -4 - la + 1, 3, 4, '#9A8A78');
    // Paws/sneakers
    B(-6, la,        4, 2, '#E8E8E8');  // white sneakers
    B(2,  1 - la,    4, 2, '#E8E8E8');
    B(-6, la,        2, 1, '#FF4444');  // red stripe
    B(2,  1 - la,    2, 1, '#FF4444');
  }

  // ── Food items ──────────────────────────────────────────────────────────
  function drawCheese(cx, cy) {
    // Wedge of cheese
    block(cx - 4*PX, cy - 6*PX, 8, 5, '#FFD700');
    block(cx - 5*PX, cy - 4*PX, 10, 3, '#FFAA00');
    block(cx - 3*PX, cy - 5*PX, 2, 2, '#FFF0A0');  // shine
    // Holes
    ctx.fillStyle = '#CC8800';
    ctx.fillRect(r(cx - 2*PX), r(cy - 3*PX), r(2*PX), r(2*PX));
    ctx.fillRect(r(cx + 2*PX), r(cy - 5*PX), r(2*PX), r(2*PX));
  }

  function drawHotdog(cx, cy) {
    // Bun (top half)
    block(cx - 5*PX, cy - 8*PX, 10, 4, '#E8A850');
    block(cx - 4*PX, cy - 9*PX, 8,  2, '#F0B860');
    block(cx - 3*PX, cy - 9*PX, 4,  1, '#FFD090');  // shine
    // Sausage
    block(cx - 5*PX, cy - 5*PX, 10, 3, '#CC4422');
    block(cx - 4*PX, cy - 5*PX, 8,  1, '#EE6644');  // top highlight
    // Mustard squiggle
    ctx.fillStyle = '#FFE000';
    ctx.fillRect(r(cx - 3*PX), r(cy - 4*PX), r(1*PX), r(1*PX));
    ctx.fillRect(r(cx - 1*PX), r(cy - 5*PX), r(1*PX), r(1*PX));
    ctx.fillRect(r(cx + 1*PX), r(cy - 4*PX), r(1*PX), r(1*PX));
    // Bun (bottom half)
    block(cx - 5*PX, cy - 3*PX, 10, 3, '#E8A850');
  }

  function drawSteamedBun(cx, cy) {
    // Round white bun
    block(cx - 5*PX, cy - 9*PX, 10, 8, '#F8F4EE');
    block(cx - 6*PX, cy - 7*PX, 12, 4, '#F0EEE8');
    block(cx - 4*PX, cy - 10*PX, 8, 2, '#FFFFFF');  // top dome
    block(cx - 3*PX, cy - 11*PX, 6, 2, '#FFFFFF');
    block(cx - 2*PX, cy - 12*PX, 4, 2, '#FFFFFF');
    // Steam wisps
    const sg = Math.abs(Math.sin(game.frame * 0.12));
    ctx.globalAlpha = 0.5 + 0.5 * sg;
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(r(cx - 3*PX), r(cy - 14*PX), r(1*PX), r(2*PX));
    ctx.fillRect(r(cx + 1*PX), r(cy - 15*PX), r(1*PX), r(2*PX));
    ctx.globalAlpha = 1;
    // Fold mark
    block(cx - 1*PX, cy - 8*PX, 3, 1, '#DDDAD4');
    // Bottom flat
    block(cx - 5*PX, cy - 2*PX, 10, 2, '#E8E4D8');
  }

  // ── Enemy: Cat ─────────────────────────────────────────────────────────
  function drawCat(cx, cy, f, dir) {
    const la = f % 2;
    ctx.save();
    ctx.translate(r(cx), r(cy));
    if (dir < 0) ctx.scale(-1, 1);
    const B = (x, y, w, h, col) => block(x * PX, y * PX, w, h, col);

    // Tail
    B(7, -8, 2, 5, '#8855AA');
    B(8, -11, 2, 3, '#6633AA');

    // Body
    B(-7, -9, 14, 7, '#8855AA');
    B(-5, -7, 9,  2, '#AA77CC');

    // Head
    B(-6, -17, 12, 9, '#8855AA');
    B(-5, -16, 10, 7, '#D0AAEE');

    // Ears
    B(-7, -20, 4, 4, '#8855AA');
    B(3,  -20, 4, 4, '#8855AA');
    B(-6, -19, 2, 2, '#FF88BB');
    B(4,  -19, 2, 2, '#FF88BB');

    // Eyes (mean)
    B(-4, -15, 3, 4, '#1A1A18');
    B(-3, -14, 1, 2, '#FFCC00');
    B(-4, -15, 1, 1, '#FFFFFF');
    B(1,  -15, 3, 4, '#1A1A18');
    B(2,  -14, 1, 2, '#FFCC00');
    B(1,  -15, 1, 1, '#FFFFFF');

    // Nose + mouth
    B(-1, -12, 1, 1, '#FF8888');
    B(-1, -11, 3, 1, '#663344');

    // Legs
    B(-5, -2 + (la*1),  3, 3, '#7744AA');
    B(2,  -2 - (la*1)+1,3, 3, '#7744AA');
    B(-6, la,            4, 2, '#662299');
    B(2,  1-la,          4, 2, '#662299');

    ctx.restore();
  }

  // ── Enemy: Subway train ─────────────────────────────────────────────────
  function drawTrain(cx, cy, dir) {
    ctx.save();
    ctx.translate(r(cx), r(cy));
    if (dir < 0) ctx.scale(-1, 1);
    const B = (x, y, w, h, col) => block(x * PX, y * PX, w, h, col);

    // Train body (long)
    B(-22, -16, 44, 14, '#2255AA');
    B(-21, -17, 42,  1, '#3366BB');
    B(-22, -3,  44,  2, '#1A3A88');

    // MTA yellow stripe
    B(-21, -12, 42, 3, '#FFD700');

    // Windows
    for (let wx = -18; wx < 18; wx += 9) {
      B(wx, -15, 5, 5, '#88CCEE');
      B(wx, -15, 5, 1, '#AADDFF');  // glare
    }

    // Front face
    B(20,  -16, 4, 16, '#1A4499');
    B(20,  -14, 4, 4, '#66AADD'); // windshield
    B(20,  -14, 4, 1, '#99CCEE');

    // Headlights
    B(22, -10, 2, 2, '#FFFFAA');
    B(22,  -7, 2, 2, '#FF4400');   // red tail light

    // "MTA" lettering (pixel)
    B(-2, -12, 1, 2, '#1A3A88');
    B(0,  -12, 1, 2, '#1A3A88');
    B(-1, -12, 1, 1, '#1A3A88');

    // Wheels
    B(-18, -1, 5, 3, '#333333');
    B(-6,  -1, 5, 3, '#333333');
    B(6,   -1, 5, 3, '#333333');
    B(18,  -1, 5, 3, '#333333');
    // Rails flash
    ctx.fillStyle = '#AAAAAA';
    ctx.fillRect(r(-22 * PX), r(-1*PX), r(44 * PX), r(1*PX));

    ctx.restore();
  }

  // ── Background ─────────────────────────────────────────────────────────
  function drawBg() {
    // Sky gradient
    const sky = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    sky.addColorStop(0, '#050312');
    sky.addColorStop(1, '#0E0828');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, GROUND_Y);

    // Stars
    for (const s of stars) {
      ctx.globalAlpha = 0.2 + 0.8 * Math.abs(Math.sin(game.frame * s.tw + s.tp));
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(r(s.x), r(s.y), s.big ? 2 : 1, s.big ? 2 : 1);
    }
    ctx.globalAlpha = 1;

    // NYC buildings silhouette
    for (const b of buildings) {
      ctx.fillStyle = b.col;
      ctx.fillRect(b.x, GROUND_Y - b.h, b.w, b.h);
      // Lit windows
      ctx.fillStyle = b.winCol;
      for (let wy = GROUND_Y - b.h + 8; wy < GROUND_Y - 8; wy += 10) {
        for (let wx = b.x + 4; wx < b.x + b.w - 4; wx += 7) {
          if (b.winMask[(wx + wy) % b.winMask.length]) {
            ctx.fillRect(wx, wy, 3, 4);
          }
        }
      }
    }

    // Neon "PIZZA" sign
    const neonAlpha = 0.5 + 0.5 * Math.abs(Math.sin(game.frame * 0.06));
    ctx.font = '9px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.globalAlpha = neonAlpha;
    ctx.fillStyle = '#FF2288';
    ctx.fillText('★ PIZZA ★', r(W * 0.72), GROUND_Y - 80);
    ctx.globalAlpha = neonAlpha * 0.4;
    ctx.fillStyle = '#FF66AA';
    ctx.fillText('★ PIZZA ★', r(W * 0.72), GROUND_Y - 80);
    ctx.globalAlpha = 1;

    // Street / sidewalk
    ctx.fillStyle = '#2A2830';
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
    // Sidewalk cracks
    ctx.fillStyle = '#222028';
    for (let x = 40; x < W; x += 80) ctx.fillRect(x, GROUND_Y, 1, H - GROUND_Y);
    ctx.fillStyle = '#323038';
    ctx.fillRect(0, GROUND_Y, W, 3);

    // Sewer grates (decorative)
    ctx.fillStyle = '#1A1820';
    for (let x = 50; x < W - 40; x += 120) {
      ctx.fillRect(x, GROUND_Y + 4, 28, 12);
      ctx.fillStyle = '#2A2830';
      for (let gx = x + 2; gx < x + 28; gx += 5) {
        ctx.fillRect(gx, GROUND_Y + 4, 2, 12);
      }
      ctx.fillStyle = '#1A1820';
    }

    // Steam vents
    for (const sp of steamPuffs) {
      ctx.globalAlpha = sp.alpha;
      ctx.fillStyle = '#AAAACC';
      ctx.fillRect(r(sp.x), r(sp.y), 3, 3);
    }
    ctx.globalAlpha = 1;
  }

  // ── HUD: Pizza life meter ───────────────────────────────────────────────
  function drawSlice(x, y, filled) {
    const sauce  = filled ? '#CC2211' : '#2A1510';
    const cheese = filled ? '#FFD044' : '#2A2210';
    const crust  = filled ? '#CC7722' : '#221508';
    // Point
    ctx.fillStyle = cheese;
    ctx.fillRect(x + 4, y,     4,  2);
    // Row 2
    ctx.fillStyle = sauce;
    ctx.fillRect(x + 2, y + 2, 8,  2);
    // Row 3
    ctx.fillStyle = cheese;
    ctx.fillRect(x,     y + 4, 12, 2);
    ctx.fillStyle = sauce;
    ctx.fillRect(x + 2, y + 5, 2,  1);
    ctx.fillRect(x + 7, y + 5, 2,  1);
    // Crust
    ctx.fillStyle = crust;
    ctx.fillRect(x,     y + 6, 12, 3);
    ctx.fillStyle = filled ? '#EE9933' : '#1A1005';
    ctx.fillRect(x + 1, y + 7, 2,  1);
  }

  function drawHUD() {
    ctx.font = '12px "Press Start 2P", monospace';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#FFD700';
    ctx.fillText(String(game.score).padStart(6, '0'), 14, 26);

    ctx.font = '7px "Press Start 2P", monospace';
    ctx.fillStyle = 'rgba(255,215,0,.45)';
    ctx.fillText('HI ' + String(game.hiScore).padStart(6, '0'), 14, 40);

    // Pizza slices (lives)
    for (let i = 0; i < 6; i++) {
      drawSlice(W - 16 - i * 15, 10, i < game.lives);
    }
  }

  // ── Particles ──────────────────────────────────────────────────────────
  function spawnCatch(x, y, type) {
    const cols =
      type === 'cheese'   ? ['#FFD700','#FFEE88','#FFAA00'] :
      type === 'hotdog'   ? ['#CC4422','#FFAA44','#E8B060'] :
                            ['#FFFFFF','#EEEECC','#AADDFF'];
    const n = type === 'bun' ? 16 : 10;
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2, s = 1.5 + Math.random() * 4;
      particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 2,
        col: cols[Math.floor(Math.random()*cols.length)],
        life: 22 + Math.random()*18, max: 40, sz: 2 + Math.random()*3 });
    }
  }

  function spawnHit(x, y) {
    screenShake = 10;
    for (let i = 0; i < 22; i++) {
      const a = Math.random() * Math.PI * 2, s = 2 + Math.random() * 5;
      particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 1.5,
        col: Math.random() > 0.5 ? '#FFCC00' : '#FF4444',
        life: 28 + Math.random()*18, max: 46, sz: 3 + Math.random()*4 });
    }
  }

  function spawnScore(x, y, pts, label) {
    const text = label || (pts === 3 ? '✦+3✦' : '+' + pts);
    floatTexts.push({ x, y, text, life: 55, max: 55, big: pts >= 3 || !!label });
  }

  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.vx *= 0.97; p.life--;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      ctx.globalAlpha = (p.life / p.max) ** 1.5;
      ctx.fillStyle = p.col;
      const s = r(p.sz * (p.life / p.max) + 1);
      ctx.fillRect(r(p.x - s/2), r(p.y - s/2), s, s);
    }
    ctx.globalAlpha = 1;
  }

  function updateFloatTexts() {
    for (let i = floatTexts.length - 1; i >= 0; i--) {
      const t = floatTexts[i];
      t.y -= 1.3; t.life--;
      if (t.life <= 0) { floatTexts.splice(i, 1); continue; }
      ctx.globalAlpha = Math.min(1, t.life / (t.max * 0.4));
      ctx.fillStyle = t.big ? '#FFDD44' : '#FFFFFF';
      ctx.font = (t.big ? '13px' : '10px') + ' "Press Start 2P", monospace';
      ctx.textAlign = 'center';
      ctx.fillText(t.text, r(t.x), r(t.y));
    }
    ctx.globalAlpha = 1;
  }

  // ── Food spawning ───────────────────────────────────────────────────────
  // Weights: cheese 55%, hotdog 30%, bun 15%
  const FOOD_TYPES = [
    { type: 'cheese', pts: 1, spd: 2.4, w: 55 },
    { type: 'hotdog', pts: 2, spd: 3.0, w: 30 },
    { type: 'bun',    pts: 3, spd: 2.0, w: 15 },
  ];

  function spawnFood() {
    let roll = Math.random() * 100, cum = 0, chosen = FOOD_TYPES[0];
    for (const ft of FOOD_TYPES) { cum += ft.w; if (roll < cum) { chosen = ft; break; } }
    food.push({
      x: rand(30, W - 30), y: -20,
      type: chosen.type, pts: chosen.pts,
      vy: chosen.spd * rand(0.85, 1.15) * (1 + difficulty * 0.07),
      frame: 0, ft: 0,
    });
  }

  // ── Enemy spawning ──────────────────────────────────────────────────────
  function spawnEnemy() {
    const isTrain = difficulty > 1.5 && Math.random() < 0.35;
    const fromLeft = Math.random() > 0.5;
    const speed = isTrain
      ? (2.8 + difficulty * 0.2) * (fromLeft ? 1 : -1)
      : (3.8 + difficulty * 0.4) * (fromLeft ? 1 : -1);

    enemyWarning = {
      side: fromLeft ? 'left' : 'right',
      type: isTrain ? 'train' : 'cat',
      life: 80,
    };
    enemies.push({
      x: fromLeft ? (isTrain ? -200 : -80) : (isTrain ? W + 200 : W + 80),
      y: GROUND_Y,
      vx: speed,
      type: isTrain ? 'train' : 'cat',
      frame: 0, ft: 0,
    });
  }

  // ── Jump ───────────────────────────────────────────────────────────────
  function tryJump() {
    if (rat.onGround && game.state === 'playing') {
      rat.vy = -13;
      rat.onGround = false;
    }
  }

  // ── Update ─────────────────────────────────────────────────────────────
  function update() {
    game.frame++;
    difficulty = 1 + Math.min(4, game.score / 30);

    // Move Pepe
    if (touching && touchX !== null) rat.x = clamp(touchX, 30, W - 30);
    if (keys['ArrowLeft']  || keys['a']) rat.x = clamp(rat.x - 5, 30, W - 30);
    if (keys['ArrowRight'] || keys['d']) rat.x = clamp(rat.x + 5, 30, W - 30);

    // Gravity
    if (!rat.onGround) {
      rat.vy += 0.5;
      rat.y += rat.vy;
      if (rat.y >= GROUND_Y) { rat.y = GROUND_Y; rat.vy = 0; rat.onGround = true; }
    }

    // Animation
    if (rat.onGround) {
      rat.frameTimer++;
      if (rat.frameTimer >= 9) { rat.frameTimer = 0; rat.frame = 1 - rat.frame; }
    }

    if (rat.invincible > 0) rat.invincible--;

    // Food
    foodTimer++;
    const fi = Math.max(26, 90 - game.score * 0.7 - difficulty * 4);
    if (foodTimer >= fi) {
      foodTimer = 0;
      spawnFood();
      if (difficulty > 2.5 && Math.random() < 0.25) spawnFood();
    }

    for (let i = food.length - 1; i >= 0; i--) {
      const f = food[i];
      f.y += f.vy;
      f.ft++; if (f.ft >= 8) { f.ft = 0; f.frame ^= 1; }

      const cl = rat.x - 11*PX, cr = rat.x + 11*PX;
      const ct = rat.y - 30*PX, cb = rat.y + 4*PX;
      if (f.x > cl && f.x < cr && f.y > ct && f.y < cb) {
        game.score += f.pts;
        if (game.score > game.hiScore) game.hiScore = game.score;
        spawnCatch(f.x, f.y, f.type);
        spawnScore(f.x, f.y - 20, f.pts);
        food.splice(i, 1);
        continue;
      }
      if (f.y > GROUND_Y + 20) food.splice(i, 1);
    }

    // Enemies
    if (enemyWarning) { enemyWarning.life--; if (enemyWarning.life <= 0) enemyWarning = null; }

    enemyTimer++;
    const ei = Math.max(150, 450 - game.score * 2.5 - difficulty * 25);
    if (enemyTimer >= ei && enemies.length < 2) { enemyTimer = 0; spawnEnemy(); }

    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.x += e.vx;
      e.ft++; if (e.ft >= 5) { e.ft = 0; e.frame ^= 1; }

      if (rat.invincible === 0 && rat.onGround) {
        const hw = e.type === 'train' ? 20*PX : 12*PX;
        if (Math.abs(rat.x - e.x) < hw + 6*PX) {
          game.lives--;
          rat.invincible = 100;
          spawnHit(rat.x, rat.y - 14*PX);
          if (game.lives <= 0) {
            game.state = 'gameover';
            showOverlay('GAME<br>OVER', 'Pepe is hungry...', 'SCORE  ' + game.score, '▶ PLAY AGAIN');
          }
        }
      }
      const gone = e.type === 'train' ? 300 : 160;
      if (e.x < -gone || e.x > W + gone) enemies.splice(i, 1);
    }

    // Steam puffs
    if (game.frame % 18 === 0) {
      const sx = Math.floor(rand(50, W - 50) / 120) * 120 + 50;
      steamPuffs.push({ x: sx + rand(-3, 3), y: GROUND_Y - 2, alpha: 0.7 });
    }
    for (let i = steamPuffs.length - 1; i >= 0; i--) {
      steamPuffs[i].y -= 0.8;
      steamPuffs[i].alpha -= 0.02;
      if (steamPuffs[i].alpha <= 0) steamPuffs.splice(i, 1);
    }

    if (screenShake > 0) screenShake = Math.max(0, screenShake - 1);
  }

  // ── Draw ───────────────────────────────────────────────────────────────
  function draw() {
    const sx = screenShake > 0 ? rand(-screenShake, screenShake) : 0;
    const sy = screenShake > 0 ? rand(-screenShake*0.5, screenShake*0.5) : 0;

    ctx.clearRect(0, 0, W, H);
    drawBg();

    ctx.save();
    if (sx || sy) ctx.translate(sx, sy);

    for (const f of food) {
      if      (f.type === 'cheese') drawCheese(f.x, f.y);
      else if (f.type === 'hotdog') drawHotdog(f.x, f.y);
      else                          drawSteamedBun(f.x, f.y);
    }

    for (const e of enemies) {
      if (e.type === 'train') drawTrain(e.x, e.y, e.vx);
      else                    drawCat(e.x, e.y, e.frame, e.vx);
    }

    drawPepe(rat.x, rat.y, rat.frame, rat.invincible);

    if (enemyWarning) {
      const blink = Math.floor(enemyWarning.life / 6) % 2 === 0;
      if (blink) {
        const icon = enemyWarning.type === 'train' ? '🚇 TRAIN!' : '🐱 CAT!';
        ctx.fillStyle = enemyWarning.type === 'train' ? '#FFCC00' : '#FF4466';
        ctx.font = '10px "Press Start 2P", monospace';
        ctx.textAlign = enemyWarning.side === 'left' ? 'left' : 'right';
        ctx.fillText(icon, enemyWarning.side === 'left' ? 14 : W - 14, GROUND_Y - 20);
      }
    }

    ctx.restore();
    updateParticles();
    updateFloatTexts();
    drawHUD();
  }

  // ── Loop ───────────────────────────────────────────────────────────────
  function loop() {
    if (game.state === 'playing') {
      update();
      draw();
    } else {
      ctx.clearRect(0, 0, W, H);
      drawBg();
      if (game.state === 'intro') {
        game.frame++;
        const tx = W / 2 + Math.sin(game.frame * 0.04) * 30;
        drawPepe(r(tx), GROUND_Y, Math.floor(game.frame / 9) % 2, 0);
        for (const f of food) {
          f.y += f.vy; f.ft++; if (f.ft >= 8) { f.ft = 0; f.frame ^= 1; }
          if      (f.type === 'cheese') drawCheese(f.x, f.y);
          else if (f.type === 'hotdog') drawHotdog(f.x, f.y);
          else                          drawSteamedBun(f.x, f.y);
          if (f.y > GROUND_Y + 20) f.y = -20;
        }
      }
    }
    requestAnimationFrame(loop);
  }

  // ── Overlay ────────────────────────────────────────────────────────────
  function showOverlay(title, sub, score, btn) {
    document.getElementById('ov-title').innerHTML = title;
    document.getElementById('ov-sub').textContent = sub;
    document.getElementById('ov-score').textContent = score;
    document.getElementById('ov-btn').textContent = btn;
    document.getElementById('overlay').classList.remove('hidden');
  }

  function startGame() {
    if (game.state === 'playing') return;
    game.score = 0; game.lives = 6; game.frame = 0; game.state = 'playing';
    food.length = 0; enemies.length = 0; particles.length = 0;
    floatTexts.length = 0; steamPuffs.length = 0;
    foodTimer = 0; enemyTimer = 120; difficulty = 1;
    enemyWarning = null; screenShake = 0;
    rat.x = W / 2; rat.y = GROUND_Y; rat.vy = 0;
    rat.onGround = true; rat.invincible = 0; rat.frame = 0; rat.frameTimer = 0;
    document.getElementById('overlay').classList.add('hidden');
  }

  function onLaunch(e) { e.stopPropagation(); startGame(); }
  document.getElementById('ov-btn').addEventListener('pointerdown', onLaunch);
  document.getElementById('ov-btn').addEventListener('click',       onLaunch);
  document.getElementById('overlay').addEventListener('pointerdown', startGame);
  document.getElementById('overlay').addEventListener('click',       startGame);

  // ── Touch controls ─────────────────────────────────────────────────────
  document.addEventListener('gesturestart',  e => e.preventDefault(), { passive: false });
  document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
  document.addEventListener('gestureend',    e => e.preventDefault(), { passive: false });

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    const now = Date.now();
    if (now - lastTapTime < 300) tryJump();
    lastTapTime = now;
    touchX = t.clientX;
    touchStartY = t.clientY;
    touchStartTime = now;
    touching = true;
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0];
    touchX = t.clientX;
    const dy = t.clientY - touchStartY;
    if (dy < -45 && Date.now() - touchStartTime < 350) {
      tryJump();
      touchStartY = t.clientY;
      touchStartTime = Date.now();
    }
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    touching = false;
  }, { passive: false });

  document.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') { tryJump(); e.preventDefault(); }
  });
  document.addEventListener('keyup', e => { keys[e.key] = false; });

  // ── Resize ─────────────────────────────────────────────────────────────
  function buildStars() {
    stars = Array.from({ length: 70 }, () => ({
      x: Math.random() * W, y: Math.random() * GROUND_Y * 0.7,
      big: Math.random() > 0.8,
      tw: 0.012 + Math.random() * 0.028, tp: Math.random() * Math.PI * 2,
    }));
  }

  function buildBuildings() {
    buildings = [];
    let x = 0;
    while (x < W) {
      const w = Math.floor(rand(40, 90));
      const h = Math.floor(rand(60, 160));
      const dark = Math.random() > 0.5;
      buildings.push({
        x, w, h,
        col: dark ? '#0E0C18' : '#14101E',
        winCol: Math.random() > 0.4 ? '#FFEE88' : '#88CCFF',
        winMask: Array.from({ length: 32 }, () => Math.random() > 0.45),
      });
      x += w + Math.floor(rand(0, 8));
    }
  }

  function buildTitleFood() {
    food.length = 0;
    for (let i = 0; i < 5; i++) {
      const t = FOOD_TYPES[Math.floor(Math.random() * FOOD_TYPES.length)];
      food.push({ x: rand(30, W-30), y: rand(-180, -10), type: t.type, pts: t.pts, vy: t.spd * 0.55, frame: 0, ft: 0 });
    }
  }

  function resize() {
    const vp = window.visualViewport;
    W = canvas.width  = r(vp ? vp.width  : window.innerWidth);
    H = canvas.height = r(vp ? vp.height : window.innerHeight);
    GROUND_Y = r(H * 0.83);
    buildStars();
    buildBuildings();
    if (game.state !== 'playing') { rat.x = W / 2; rat.y = GROUND_Y; }
  }

  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 250));
  if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);

  requestAnimationFrame(() => { resize(); buildTitleFood(); requestAnimationFrame(loop); });

})();
</script>
</body>
